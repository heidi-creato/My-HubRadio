<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>راديو سحابي | نجوم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/@dnd-kit/sortable@latest/dist/index.js"></script>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a, #020617); color: white; min-height: 100vh; }
    .hidden { display: none !important; }
    
    /* شاشة التحميل */
    #splash-screen {
      position: fixed; inset: 0; background: linear-gradient(135deg, #020617, #0f172a);
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
    }
    .loader {
      width: 80px; height: 80px; border-radius: 50%;
      border: 4px solid rgba(34,197,94,0.1);
      border-top: 4px solid #22c55e;
      border-right: 4px solid #3b82f6;
      animation: spin 1s ease infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .glass-card {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
    }
    
    /* المصادقة */
    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { width: 100%; max-width: 450px; padding: 40px; }
    .auth-card h2 { text-align: center; margin-bottom: 30px; background: linear-gradient(135deg, #22c55e, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .auth-card input { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; color: white; font-size: 16px; }
    .auth-card input:focus { outline: none; border: 1px solid #22c55e; }
    .auth-card button { width: 100%; padding: 14px; background: linear-gradient(135deg, #22c55e, #16a34a); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: transform 0.2s; margin-bottom: 10px; }
    .auth-card button:hover { transform: translateY(-2px); }
    .auth-card p { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.7); }
    .auth-card span { color: #22c55e; cursor: pointer; }
    .google-btn { background: linear-gradient(135deg, #ea4335, #c5221f) !important; }
    
    /* التطبيق الرئيسي */
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 280px; padding: 25px; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; overflow-y: auto; }
    .sidebar h1 { margin-bottom: 25px; font-size: 1.5rem; }
    .sidebar button { width: 100%; padding: 12px; margin-bottom: 15px; background: linear-gradient(135deg, #22c55e, #16a34a); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
    .sidebar button:hover { transform: translateY(-2px); }
    #searchInput { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; color: white; margin-bottom: 20px; }
    #searchInput:focus { outline: none; border: 1px solid #22c55e; }
    .menu-item { padding: 12px; margin-bottom: 5px; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
    .menu-item:hover { background: rgba(255,255,255,0.1); }
    .menu-item.active { background: rgba(34,197,94,0.2); border-left: 3px solid #22c55e; }
    .logout-btn { background: linear-gradient(135deg, #ef4444, #dc2626) !important; }
    .main-content { flex: 1; padding: 25px; overflow-y: auto; }
    .topbar { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .topbar h2 { background: linear-gradient(135deg, #22c55e, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    
    /* خيارات العرض */
    .view-options { display: flex; gap: 10px; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 50px; }
    .view-btn { background: transparent; border: none; padding: 8px 16px; border-radius: 30px; color: white; cursor: pointer; transition: all 0.2s; }
    .view-btn.active { background: #22c55e; }
    
    /* عرض شبكي (افتراضي) */
    .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .radio-card { padding: 12px; transition: transform 0.2s, box-shadow 0.2s; cursor: grab; }
    .radio-card:active { cursor: grabbing; }
    .radio-card.dragging { opacity: 0.5; cursor: grabbing; }
    .radio-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.08); }
    .radio-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 16px; margin-bottom: 10px; background: #1e293b; }
    .radio-card h3 { font-size: 14px; margin-bottom: 4px; }
    .radio-card p { font-size: 11px; color: rgba(255,255,255,0.6); }
    .card-actions { display: flex; gap: 5px; margin-top: 10px; }
    .card-actions button { flex: 1; padding: 6px; font-size: 12px; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    
    /* عرض عمودي */
    .vertical-view .radio-grid { display: flex; flex-direction: column; gap: 12px; }
    .vertical-view .radio-card { display: flex; align-items: center; gap: 15px; padding: 12px; }
    .vertical-view .radio-card img { width: 60px; height: 60px; border-radius: 12px; margin: 0; }
    .vertical-view .radio-card .card-info { flex: 1; }
    .vertical-view .radio-card h3 { font-size: 16px; margin: 0; }
    .vertical-view .radio-card p { font-size: 12px; margin: 5px 0 0; }
    .vertical-view .card-actions { margin: 0; width: auto; }
    
    /* عرض ايقونات دائرية */
    .circle-view .radio-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .circle-view .radio-card { text-align: center; width: 100px; padding: 10px; cursor: pointer; }
    .circle-view .radio-card img { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 10px; object-fit: cover; border: 3px solid #22c55e; }
    .circle-view .radio-card h3 { font-size: 13px; text-align: center; }
    .circle-view .radio-card p { display: none; }
    .circle-view .card-actions { display: none; }
    
    /* مشغل الصوت */
    .mini-player { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(15,23,42,0.98); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
    .player-left { display: flex; align-items: center; gap: 12px; }
    .player-left img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
    .player-controls { display: flex; gap: 12px; }
    .player-controls button { width: 38px; height: 38px; border-radius: 50%; border: none; background: #22c55e; color: white; cursor: pointer; }
    .volume-wrapper { display: flex; align-items: center; gap: 10px; }
    .volume-wrapper input { width: 100px; }
    
    /* مودال التعديل */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1001; }
    .modal-content { width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 25px; }
    .modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 12px; background: rgba(255,255,255,0.1); border: none; border-radius: 10px; color: white; }
    .image-upload-area { border: 2px dashed rgba(255,255,255,0.3); border-radius: 16px; padding: 15px; text-align: center; cursor: pointer; margin-bottom: 12px; }
    .image-preview { text-align: center; margin: 10px 0; }
    .image-preview img { width: 100px; height: 100px; border-radius: 16px; object-fit: cover; }
    
    .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.5); }
    .drag-handle { cursor: grab; font-size: 18px; margin-left: 8px; color: #22c55e; }
    
    @media (max-width: 768px) { 
      .app { flex-direction: column; } 
      .sidebar { width: 100%; height: auto; position: relative; } 
      .mini-player { flex-direction: column; height: auto; gap: 10px; padding: 12px; }
      .radio-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="loader"></div>
    <div id="loading-status">جاري تحميل الراديو...</div>
  </div>

  <div class="auth-container hidden" id="authContainer">
    <div class="glass-card auth-card" id="loginCard">
      <h2>🔐 تسجيل الدخول</h2>
      <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
      <input type="password" id="loginPassword" placeholder="كلمة المرور">
      <button id="loginBtn">تسجيل الدخول</button>
      <button id="googleLoginBtn" class="google-btn"><i class="fab fa-google"></i> Google</button>
      <p>ليس لديك حساب؟ <span id="showRegister">إنشاء حساب</span></p>
    </div>
    <div class="glass-card auth-card hidden" id="registerCard">
      <h2>📝 إنشاء حساب</h2>
      <input type="text" id="registerName" placeholder="الاسم">
      <input type="email" id="registerEmail" placeholder="البريد الإلكتروني">
      <input type="password" id="registerPassword" placeholder="كلمة المرور">
      <input type="password" id="registerConfirmPassword" placeholder="تأكيد">
      <button id="registerBtn">إنشاء حساب</button>
      <p>لديك حساب؟ <span id="showLogin">تسجيل الدخول</span></p>
    </div>
  </div>

  <div class="app hidden" id="app">
    <aside class="sidebar glass-card">
      <div>
        <h1>📻 راديو نجوم</h1>
        <button id="addRadioBtn">+ إضافة محطة</button>
        <input type="text" id="searchInput" placeholder="بحث...">
        <div class="menu">
          <div class="menu-item active" data-filter="all">🏠 الرئيسية</div>
          <div class="menu-item" data-filter="favorites">❤️ المفضلة</div>
          <div class="menu-item" data-filter="recent">🕒 آخر تشغيل</div>
        </div>
      </div>
      <button id="logoutBtn" class="logout-btn">🚪 خروج</button>
    </aside>
    <main class="main-content">
      <div class="topbar">
        <h2 id="pageTitle">📻 جميع المحطات</h2>
        <div class="view-options">
          <button class="view-btn active" data-view="grid">📱 شبكي</button>
          <button class="view-btn" data-view="vertical">📋 عمودي</button>
          <button class="view-btn" data-view="circle">⚪ دائري</button>
        </div>
      </div>
      <div id="radioGrid" class="radio-grid"></div>
    </main>
  </div>

  <!-- مودال إضافة/تعديل -->
  <div class="modal hidden" id="radioModal">
    <div class="modal-content glass-card">
      <h2 id="modalTitle">➕ محطة جديدة</h2>
      <input type="text" id="radioName" placeholder="اسم المحطة *">
      <input type="text" id="radioUrl" placeholder="رابط البث *">
      <input type="text" id="radioCategory" placeholder="التصنيف">
      <div class="image-upload-area" id="imageUploadArea">
        <i class="fas fa-cloud-upload-alt" style="font-size: 28px;"></i>
        <p>اضغط لرفع صورة</p>
        <input type="file" id="radioImage" accept="image/*" style="display: none;">
      </div>
      <div id="imagePreview" class="image-preview hidden">
        <img id="previewImg" src="">
        <p style="font-size:12px">✅ الصورة الحالية</p>
      </div>
      <div id="uploadProgress" class="hidden" style="text-align:center; margin:10px; color:#22c55e;">جاري الرفع...</div>
      <button id="saveRadioBtn">💾 حفظ</button>
      <button id="closeModalBtn">❌ إلغاء</button>
    </div>
  </div>

  <div class="mini-player hidden" id="miniPlayer">
    <div class="player-left">
      <img id="playerImage" src="">
      <div><h4 id="playerTitle">لا توجد محطة</h4><span>🎵 مباشر</span></div>
    </div>
    <div class="player-controls">
      <button id="prevBtn">⏮</button>
      <button id="playPauseBtn">▶</button>
      <button id="nextBtn">⏭</button>
    </div>
    <div class="volume-wrapper">🔊 <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8"></div>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBRvU198Ov7i6XdQTiKkuPJ-8biyKQt0Eo",
      authDomain: "radioapp-4f31a.firebaseapp.com",
      projectId: "radioapp-4f31a",
      storageBucket: "radioapp-4f31a.firebasestorage.app",
      messagingSenderId: "109582001862",
      appId: "1:109582001862:web:0f88fc50166c6d3d3019c7"
    };

    // Cloudinary Config
    const CLOUDINARY_CLOUD_NAME = "dqdpbqkyp";
    const CLOUDINARY_UPLOAD_PRESET = "radio_stations";

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let currentUser = null;
    let radios = [];
    let currentFilter = 'all';
    let currentPlayingId = null;
    let currentView = 'grid';
    let editId = null;
    let audio = new Audio();
    audio.volume = 0.8;
    let unsubscribeRadios = null;
    let currentCloudinaryUrl = null;
    let dragSourceIndex = null;

    function showToast(icon, title) {
      Swal.fire({ toast: true, position: 'top-end', icon, title, showConfirmButton: false, timer: 3000, background: '#1e293b', color: '#fff' });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // رفع الصورة
    async function uploadToCloudinary(file) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
      const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
        method: 'POST', body: formData
      });
      if(!response.ok) throw new Error('فشل الرفع');
      const data = await response.json();
      return data.secure_url;
    }

    // حفظ ترتيب القنوات
    async function saveOrder() {
      if(!currentUser) return;
      const order = radios.map(r => r.id);
      await db.collection('users').doc(currentUser.uid).set({ order }, { merge: true });
    }

    // تحميل المحطات مع الترتيب
    function listenToRadios() {
      if(unsubscribeRadios) unsubscribeRadios();
      if(!currentUser) return;
      
      unsubscribeRadios = db.collection('radios').onSnapshot(async (snapshot) => {
        const userDoc = await db.collection('users').doc(currentUser.uid).get();
        const savedOrder = userDoc.exists ? userDoc.data().order : [];
        
        radios = [];
        snapshot.forEach(docSnap => {
          radios.push({ id: docSnap.id, ...docSnap.data(), favorite: docSnap.data().favorite || false });
        });
        
        if(savedOrder && savedOrder.length) {
          radios.sort((a,b) => {
            const ia = savedOrder.indexOf(a.id);
            const ib = savedOrder.indexOf(b.id);
            if(ia === -1) return 1;
            if(ib === -1) return -1;
            return ia - ib;
          });
        }
        renderRadios();
        hideSplash();
      });
    }

    function renderRadios() {
      const grid = document.getElementById('radioGrid');
      let filtered = [...radios];
      if(currentFilter === 'favorites') filtered = radios.filter(r => r.favorite);
      else if(currentFilter === 'recent') {
        const recentIds = JSON.parse(localStorage.getItem(`recent_${currentUser.uid}`) || '[]');
        filtered = recentIds.map(id => radios.find(r => r.id == id)).filter(Boolean);
      }
      
      if(filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-radio" style="font-size:48px"></i><h3>لا توجد محطات</h3></div>';
        return;
      }
      
      if(currentView === 'circle') {
        grid.innerHTML = filtered.map(radio => `
          <div class="radio-card" data-id="${radio.id}" draggable="false">
            <img src="${radio.imageUrl || 'https://placehold.co/200x200/1e293b/22c55e?text=Radio'}" onerror="this.src='https://placehold.co/200x200/1e293b/22c55e?text=Radio'">
            <h3>${escapeHtml(radio.name)}</h3>
            <div class="card-actions" style="display:none"></div>
          </div>
        `).join('');
        // إضافة حدث النقر للتشغيل
        document.querySelectorAll('.radio-card').forEach(card => {
          card.onclick = () => window.playRadio(card.dataset.id);
        });
      } else {
        grid.innerHTML = filtered.map((radio, idx) => `
          <div class="radio-card" data-id="${radio.id}" draggable="${currentView === 'grid'}">
            ${currentView === 'grid' ? '<span class="drag-handle">⋮⋮</span>' : ''}
            <img src="${radio.imageUrl || 'https://placehold.co/400x300/1e293b/22c55e?text=Radio'}" onerror="this.src='https://placehold.co/400x300/1e293b/22c55e?text=Radio'">
            <div class="card-info">
              <h3>${escapeHtml(radio.name)}</h3>
              <p>${escapeHtml(radio.category || 'عام')}</p>
            </div>
            <div class="card-actions">
              <button class="play-btn" onclick="window.playRadio('${radio.id}')">▶</button>
              <button class="favorite-btn ${radio.favorite ? 'active' : ''}" onclick="window.toggleFavorite('${radio.id}')">❤️</button>
              <button class="edit-btn" onclick="window.editRadio('${radio.id}')">✏️</button>
              <button class="delete-btn" onclick="window.deleteRadio('${radio.id}')">🗑️</button>
            </div>
          </div>
        `).join('');
        
        if(currentView === 'grid') {
          enableDragAndDrop();
        }
      }
    }

    // تفعيل السحب والإفلات
    function enableDragAndDrop() {
      const cards = document.querySelectorAll('.radio-card');
      let dragSrc = null;
      
      cards.forEach(card => {
        card.setAttribute('draggable', 'true');
        card.addEventListener('dragstart', (e) => {
          dragSrc = card;
          e.dataTransfer.effectAllowed = 'move';
          card.classList.add('dragging');
        });
        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
        });
        card.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
        });
        card.addEventListener('drop', async (e) => {
          e.preventDefault();
          if(dragSrc !== card) {
            const fromId = dragSrc.dataset.id;
            const toId = card.dataset.id;
            const fromIndex = radios.findIndex(r => r.id == fromId);
            const toIndex = radios.findIndex(r => r.id == toId);
            const [moved] = radios.splice(fromIndex, 1);
            radios.splice(toIndex, 0, moved);
            renderRadios();
            await saveOrder();
            showToast('success', 'تم تحديث الترتيب');
          }
        });
      });
    }

    // وظائف التشغيل
    window.playRadio = function(id) {
      const station = radios.find(r => r.id == id);
      if(!station) return;
      currentPlayingId = id;
      audio.src = station.streamUrl;
      audio.play().catch(() => showToast('error', 'لا يمكن تشغيل البث'));
      document.getElementById('miniPlayer').classList.remove('hidden');
      document.getElementById('playerTitle').innerText = station.name;
      document.getElementById('playerImage').src = station.imageUrl || 'https://placehold.co/200x200/1e293b/22c55e?text=Radio';
      document.getElementById('playPauseBtn').innerHTML = '⏸';
      
      let recent = JSON.parse(localStorage.getItem(`recent_${currentUser.uid}`) || '[]');
      recent = [id, ...recent.filter(i => i != id)].slice(0, 10);
      localStorage.setItem(`recent_${currentUser.uid}`, JSON.stringify(recent));
      if(currentFilter === 'recent') renderRadios();
      showToast('success', `تشغيل ${station.name}`);
    };

    window.toggleFavorite = async function(id) {
      const station = radios.find(r => r.id == id);
      await db.collection('radios').doc(id).update({ favorite: !station.favorite });
    };

    window.deleteRadio = async function(id) {
      const result = await Swal.fire({ title: 'حذف المحطة؟', icon: 'warning', showCancelButton: true });
      if(result.isConfirmed) {
        await db.collection('radios').doc(id).delete();
        if(currentPlayingId == id) { audio.pause(); document.getElementById('miniPlayer').classList.add('hidden'); }
        showToast('success', 'تم الحذف');
      }
    };

    window.editRadio = async function(id) {
      const radio = radios.find(r => r.id == id);
      editId = id;
      document.getElementById('modalTitle').innerText = '✏️ تعديل المحطة';
      document.getElementById('radioName').value = radio.name;
      document.getElementById('radioUrl').value = radio.streamUrl;
      document.getElementById('radioCategory').value = radio.category || '';
      currentCloudinaryUrl = radio.imageUrl;
      if(currentCloudinaryUrl) {
        document.getElementById('imagePreview').classList.remove('hidden');
        document.getElementById('previewImg').src = currentCloudinaryUrl;
      } else {
        document.getElementById('imagePreview').classList.add('hidden');
      }
      document.getElementById('radioModal').classList.remove('hidden');
    };

    // المصادقة مع تأكيد البريد
    document.getElementById('registerBtn').onclick = async () => {
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirmPassword').value;
      if(password !== confirm) return showToast('error', 'كلمتا المرور غير متطابقتين');
      try {
        const userCred = await auth.createUserWithEmailAndPassword(email, password);
        await userCred.user.updateProfile({ displayName: name });
        await userCred.user.sendEmailVerification();
        showToast('success', 'تم التسجيل! راجع بريدك لتفعيل الحساب');
        await auth.signOut();
        document.getElementById('registerCard').classList.add('hidden');
        document.getElementById('loginCard').classList.remove('hidden');
      } catch(err) { showToast('error', err.message); }
    };

    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      try {
        const userCred = await auth.signInWithEmailAndPassword(email, password);
        if(!userCred.user.emailVerified) {
          await auth.signOut();
          showToast('error', 'يرجى تأكيد بريدك الإلكتروني أولاً');
        }
      } catch(err) { showToast('error', 'بيانات غير صحيحة'); }
    };

    document.getElementById('googleLoginBtn').onclick = async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch(err) { showToast('error', err.message); }
    };

    document.getElementById('showRegister').onclick = () => {
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('registerCard').classList.remove('hidden');
    };
    document.getElementById('showLogin').onclick = () => {
      document.getElementById('registerCard').classList.add('hidden');
      document.getElementById('loginCard').classList.remove('hidden');
    };
    document.getElementById('logoutBtn').onclick = async () => {
      await auth.signOut();
      audio.pause();
      document.getElementById('miniPlayer').classList.add('hidden');
    };

    // حفظ المحطة (إضافة أو تعديل)
    document.getElementById('saveRadioBtn').onclick = async () => {
      const name = document.getElementById('radioName').value.trim();
      const streamUrl = document.getElementById('radioUrl').value.trim();
      if(!name || !streamUrl) return showToast('warning', 'املأ الحقول المطلوبة');
      
      const data = {
        name, streamUrl,
        category: document.getElementById('radioCategory').value.trim() || 'عام',
        imageUrl: currentCloudinaryUrl || null,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      
      if(editId) {
        await db.collection('radios').doc(editId).update(data);
        showToast('success', 'تم التعديل');
      } else {
        data.favorite = false;
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('radios').add(data);
        showToast('success', 'تمت الإضافة');
      }
      
      document.getElementById('radioModal').classList.add('hidden');
      editId = null;
      document.getElementById('radioName').value = '';
      document.getElementById('radioUrl').value = '';
      document.getElementById('radioCategory').value = '';
      currentCloudinaryUrl = null;
      document.getElementById('imagePreview').classList.add('hidden');
    };

    // رفع الصورة
    const imageUploadArea = document.getElementById('imageUploadArea');
    const imageInput = document.getElementById('radioImage');
    imageUploadArea.onclick = () => imageInput.click();
    imageInput.onchange = async (e) => {
      const file = e.target.files[0];
      if(!file) return;
      document.getElementById('uploadProgress').classList.remove('hidden');
      try {
        const url = await uploadToCloudinary(file);
        currentCloudinaryUrl = url;
        document.getElementById('imagePreview').classList.remove('hidden');
        document.getElementById('previewImg').src = url;
        showToast('success', 'تم رفع الصورة');
      } catch(err) { showToast('error', 'فشل الرفع'); }
      document.getElementById('uploadProgress').classList.add('hidden');
    };

    document.getElementById('addRadioBtn').onclick = () => {
      editId = null;
      document.getElementById('modalTitle').innerText = '➕ محطة جديدة';
      document.getElementById('radioName').value = '';
      document.getElementById('radioUrl').value = '';
      document.getElementById('radioCategory').value = '';
      currentCloudinaryUrl = null;
      document.getElementById('imagePreview').classList.add('hidden');
      document.getElementById('radioModal').classList.remove('hidden');
    };
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('radioModal').classList.add('hidden');

    // تبديل العرض
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        const appDiv = document.getElementById('app');
        appDiv.classList.remove('vertical-view', 'circle-view');
        if(currentView === 'vertical') appDiv.classList.add('vertical-view');
        else if(currentView === 'circle') appDiv.classList.add('circle-view');
        renderRadios();
      };
    });

    // تحكمات المشغل
    document.getElementById('playPauseBtn').onclick = () => {
      if(audio.paused) { audio.play(); document.getElementById('playPauseBtn').innerHTML = '⏸'; }
      else { audio.pause(); document.getElementById('playPauseBtn').innerHTML = '▶'; }
    };
    document.getElementById('prevBtn').onclick = () => {
      if(radios.length && currentPlayingId) {
        let idx = radios.findIndex(r => r.id == currentPlayingId);
        idx = (idx - 1 + radios.length) % radios.length;
        window.playRadio(radios[idx].id);
      }
    };
    document.getElementById('nextBtn').onclick = () => {
      if(radios.length && currentPlayingId) {
        let idx = radios.findIndex(r => r.id == currentPlayingId);
        idx = (idx + 1) % radios.length;
        window.playRadio(radios[idx].id);
      }
    };
    document.getElementById('volumeSlider').oninput = (e) => audio.volume = e.target.value;
    document.getElementById('searchInput').oninput = (e) => {
      const val = e.target.value.toLowerCase();
      document.querySelectorAll('.radio-card').forEach(card => {
        const title = card.querySelector('h3')?.innerText.toLowerCase() || '';
        card.style.display = title.includes(val) ? '' : 'none';
      });
    };

    // الفلتر
    document.querySelectorAll('.menu-item').forEach(item => {
      item.onclick = () => {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentFilter = item.dataset.filter;
        renderRadios();
        const titles = { all: '📻 جميع المحطات', favorites: '❤️ المفضلة', recent: '🕒 آخر تشغيل' };
        document.getElementById('pageTitle').innerText = titles[currentFilter];
      };
    });

    // مراقبة المصادقة
    auth.onAuthStateChanged((user) => {
      if(user && user.emailVerified) {
        currentUser = user;
        document.getElementById('authContainer').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        listenToRadios();
        hideSplash();
      } else if(user && !user.emailVerified) {
        auth.signOut();
        document.getElementById('authContainer').classList.remove('hidden');
        document.getElementById('app').classList.add('hidden');
        hideSplash();
        showToast('warning', 'يرجى تأكيد بريدك الإلكتروني');
      } else {
        currentUser = null;
        document.getElementById('app').classList.add('hidden');
        document.getElementById('authContainer').classList.remove('hidden');
        document.getElementById('miniPlayer').classList.add('hidden');
        audio.pause();
        hideSplash();
      }
    });

    function hideSplash() {
      const splash = document.getElementById('splash-screen');
      if(splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 500); }
    }
    setTimeout(() => hideSplash(), 3000);
  </script>
</body>
</html>
