<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>راديو سحابي | نجوم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a, #020617); color: white; min-height: 100vh; padding-bottom: 80px; }
    .hidden { display: none !important; }
    
    /* شاشة التحميل */
    #splash-screen {
      position: fixed; inset: 0; background: linear-gradient(135deg, #020617, #0f172a);
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
    }
    .loader {
      width: 80px; height: 80px; border-radius: 50%;
      border: 4px solid rgba(34,197,94,0.1);
      border-top: 4px solid #22c55e;
      border-right: 4px solid #3b82f6;
      animation: spin 1s ease infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .glass-card {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
    }
    
    /* المصادقة */
    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { width: 100%; max-width: 450px; padding: 40px; }
    .auth-card h2 { text-align: center; margin-bottom: 30px; background: linear-gradient(135deg, #22c55e, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .auth-card input { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; color: white; font-size: 16px; }
    .auth-card input:focus { outline: none; border: 1px solid #22c55e; }
    .auth-card button { width: 100%; padding: 14px; background: linear-gradient(135deg, #22c55e, #16a34a); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: transform 0.2s; margin-bottom: 10px; }
    .auth-card button:hover { transform: translateY(-2px); }
    .auth-card p { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.7); }
    .auth-card span { color: #22c55e; cursor: pointer; }
    .google-btn { background: linear-gradient(135deg, #ea4335, #c5221f) !important; }
    
    /* التطبيق الرئيسي */
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 280px; padding: 25px; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; overflow-y: auto; }
    .sidebar h1 { margin-bottom: 25px; font-size: 1.5rem; text-align: center; }
    .sidebar button { width: 100%; padding: 12px; margin-bottom: 12px; background: linear-gradient(135deg, #22c55e, #16a34a); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
    .sidebar button:hover { transform: translateY(-2px); }
    #searchInput { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; color: white; margin-bottom: 20px; }
    #searchInput:focus { outline: none; border: 1px solid #22c55e; }
    .menu-item { padding: 12px; margin-bottom: 5px; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
    .menu-item:hover { background: rgba(255,255,255,0.1); }
    .menu-item.active { background: rgba(34,197,94,0.2); border-left: 3px solid #22c55e; }
    .logout-btn { background: linear-gradient(135deg, #ef4444, #dc2626) !important; }
    .profile-btn { background: linear-gradient(135deg, #3b82f6, #1e40af) !important; margin-top: 10px; }
    .main-content { flex: 1; padding: 25px; overflow-y: auto; margin-bottom: 20px; }
    .topbar { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .topbar h2 { background: linear-gradient(135deg, #22c55e, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    
    /* خيارات العرض */
    .view-options { display: flex; gap: 10px; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 50px; }
    .view-btn { background: transparent; border: none; padding: 8px 16px; border-radius: 30px; color: white; cursor: pointer; transition: all 0.2s; }
    .view-btn.active { background: #22c55e; }
    .edit-mode-btn { background: #f59e0b !important; color: white !important; }
    
    /* شبكة القنوات */
    .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
    .radio-card { position: relative; padding: 12px; transition: all 0.2s; cursor: pointer; border-radius: 20px; background: rgba(255,255,255,0.03); }
    .radio-card.edit-mode { cursor: grab; }
    .radio-card.edit-mode:active { cursor: grabbing; }
    .radio-card.dragging { opacity: 0.5; }
    .radio-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 16px; margin-bottom: 10px; background: #1e293b; transition: transform 0.2s; }
    .radio-card:hover img { transform: scale(1.02); }
    .radio-card h3 { font-size: 14px; margin-bottom: 4px; text-align: center; }
    
    /* زر القائمة الثلاثية */
    .menu-dots {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      backdrop-filter: blur(5px);
      transition: all 0.2s;
    }
    .menu-dots:hover { background: #22c55e; transform: scale(1.05); }
    .drag-handle {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      z-index: 10;
    }
    
    /* عرض عمودي */
    .vertical-view .radio-grid { display: flex; flex-direction: column; gap: 12px; }
    .vertical-view .radio-card { display: flex; align-items: center; gap: 15px; padding: 12px; }
    .vertical-view .radio-card img { width: 60px; height: 60px; margin: 0; }
    .vertical-view .radio-card h3 { text-align: right; flex: 1; margin: 0; }
    .vertical-view .menu-dots { position: static; margin-right: auto; }
    .vertical-view .drag-handle { position: static; margin-left: auto; }
    
    /* عرض دائري */
    .circle-view .radio-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; }
    .circle-view .radio-card { text-align: center; width: 100px; padding: 10px; }
    .circle-view .radio-card img { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 10px; border: 3px solid #22c55e; }
    .circle-view .radio-card h3 { font-size: 12px; }
    .circle-view .menu-dots { top: 5px; right: 5px; width: 28px; height: 28px; }
    .circle-view .drag-handle { top: 5px; left: 5px; width: 28px; height: 28px; }
    
    /* صفحة الملف الشخصي */
    .profile-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .profile-card { width: 100%; max-width: 500px; padding: 40px; text-align: center; }
    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 20px;
      object-fit: cover;
      border: 4px solid #22c55e;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .profile-avatar:hover { transform: scale(1.05); }
    .profile-card h2 { margin-bottom: 10px; }
    .profile-card p { color: rgba(255,255,255,0.7); margin-bottom: 30px; }
    .profile-input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; color: white; text-align: center; font-size: 16px; }
    
    /* مشغل الصوت */
    .mini-player { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: rgba(15,23,42,0.98); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
    .player-left { display: flex; align-items: center; gap: 12px; }
    .player-left img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
    .player-controls { display: flex; gap: 12px; }
    .player-controls button { width: 38px; height: 38px; border-radius: 50%; border: none; background: #22c55e; color: white; cursor: pointer; }
    .volume-wrapper { display: flex; align-items: center; gap: 10px; }
    .volume-wrapper input { width: 100px; }
    
    .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.5); }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1001; }
    .modal-content { width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 25px; }
    .modal-content input { width: 100%; padding: 12px; margin-bottom: 12px; background: rgba(255,255,255,0.1); border: none; border-radius: 10px; color: white; }
    .image-upload-area { border: 2px dashed rgba(255,255,255,0.3); border-radius: 16px; padding: 15px; text-align: center; cursor: pointer; margin-bottom: 12px; }
    .image-preview { text-align: center; margin: 10px 0; }
    .image-preview img { width: 100px; height: 100px; border-radius: 16px; object-fit: cover; }
    
    @media (max-width: 768px) { 
      .app { flex-direction: column; } 
      .sidebar { width: 100%; height: auto; position: relative; } 
      .radio-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
    }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="loader"></div>
    <div id="loading-status">جاري تحميل الراديو...</div>
  </div>

  <div class="auth-container hidden" id="authContainer">
    <div class="glass-card auth-card" id="loginCard">
      <h2>🔐 تسجيل الدخول</h2>
      <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
      <input type="password" id="loginPassword" placeholder="كلمة المرور">
      <button id="loginBtn">تسجيل الدخول</button>
      <button id="googleLoginBtn" class="google-btn"><i class="fab fa-google"></i> Google</button>
      <p>ليس لديك حساب؟ <span id="showRegister">إنشاء حساب</span></p>
    </div>
    <div class="glass-card auth-card hidden" id="registerCard">
      <h2>📝 إنشاء حساب</h2>
      <input type="text" id="registerName" placeholder="الاسم">
      <input type="email" id="registerEmail" placeholder="البريد الإلكتروني">
      <input type="password" id="registerPassword" placeholder="كلمة المرور">
      <input type="password" id="registerConfirmPassword" placeholder="تأكيد">
      <button id="registerBtn">إنشاء حساب</button>
      <p>لديك حساب؟ <span id="showLogin">تسجيل الدخول</span></p>
    </div>
  </div>

  <div class="app hidden" id="app">
    <aside class="sidebar glass-card">
      <div>
        <h1>📻 راديو نجوم</h1>
        <button id="addRadioBtn">+ إضافة محطة</button>
        <button id="toggleEditModeBtn" class="edit-mode-btn">✋ وضع الترتيب</button>
        <input type="text" id="searchInput" placeholder="بحث...">
        <div class="menu">
          <div class="menu-item active" data-filter="all">🏠 الرئيسية</div>
          <div class="menu-item" data-filter="favorites">❤️ المفضلة</div>
        </div>
      </div>
      <div>
        <button id="profileBtn" class="profile-btn">👤 ملفي الشخصي</button>
        <button id="logoutBtn" class="logout-btn">🚪 خروج</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="topbar">
        <h2 id="pageTitle">📻 جميع المحطات</h2>
        <div class="view-options">
          <button class="view-btn active" data-view="grid">📱 شبكي</button>
          <button class="view-btn" data-view="vertical">📋 عمودي</button>
          <button class="view-btn" data-view="circle">⚪ دائري</button>
        </div>
      </div>
      <div id="radioGrid" class="radio-grid"></div>
    </main>
  </div>

  <!-- صفحة الملف الشخصي -->
  <div class="profile-container hidden" id="profileContainer">
    <div class="glass-card profile-card">
      <img id="profileAvatar" class="profile-avatar" src="https://placehold.co/200x200/1e293b/22c55e?text=User" onclick="document.getElementById('profileImageInput').click()">
      <input type="file" id="profileImageInput" accept="image/*" style="display: none;">
      <h2 id="profileName">اسم المستخدم</h2>
      <p id="profileEmail">البريد الإلكتروني</p>
      <input type="text" id="editNameInput" class="profile-input hidden" placeholder="الاسم الجديد">
      <button id="editProfileBtn" class="edit-mode-btn" style="margin-bottom: 10px;">✏️ تعديل الاسم</button>
      <button id="saveNameBtn" class="hidden" style="background: #22c55e; margin-bottom: 10px;">💾 حفظ التغييرات</button>
      <button id="backToAppBtn" style="background: #475569;">🔙 العودة للتطبيق</button>
    </div>
  </div>

  <!-- مودال إضافة/تعديل القناة -->
  <div class="modal hidden" id="radioModal">
    <div class="modal-content glass-card">
      <h2 id="modalTitle">➕ محطة جديدة</h2>
      <input type="text" id="radioName" placeholder="اسم المحطة *">
      <input type="text" id="radioUrl" placeholder="رابط البث *">
      <input type="text" id="radioCategory" placeholder="التصنيف">
      <div class="image-upload-area" id="imageUploadArea">
        <i class="fas fa-cloud-upload-alt" style="font-size:28px;"></i>
        <p>اضغط لرفع صورة</p>
        <input type="file" id="radioImage" accept="image/*" style="display:none;">
      </div>
      <div id="imagePreview" class="image-preview hidden">
        <img id="previewImg">
      </div>
      <div id="uploadProgress" class="hidden" style="text-align:center; margin:10px; color:#22c55e;">جاري الرفع...</div>
      <button id="saveRadioBtn" style="background:#22c55e;">💾 حفظ</button>
      <button id="deleteFromModalBtn" class="hidden" style="background:#ef4444; margin-top:10px;">🗑️ حذف المحطة</button>
      <button id="closeModalBtn" style="background:#475569;">❌ إلغاء</button>
    </div>
  </div>

  <div class="mini-player hidden" id="miniPlayer">
    <div class="player-left">
      <img id="playerImage" src="">
      <div><h4 id="playerTitle">لا توجد محطة</h4><span>🎵 مباشر</span></div>
    </div>
    <div class="player-controls">
      <button id="prevBtn">⏮</button>
      <button id="playPauseBtn">▶</button>
      <button id="nextBtn">⏭</button>
    </div>
    <div class="volume-wrapper">🔊 <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8"></div>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBRvU198Ov7i6XdQTiKkuPJ-8biyKQt0Eo",
      authDomain: "radioapp-4f31a.firebaseapp.com",
      projectId: "radioapp-4f31a",
      storageBucket: "radioapp-4f31a.firebasestorage.app",
      messagingSenderId: "109582001862",
      appId: "1:109582001862:web:0f88fc50166c6d3d3019c7"
    };

    const CLOUDINARY_CLOUD_NAME = "dqdpbqkyp";
    const CLOUDINARY_UPLOAD_PRESET = "radio_stations";

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let currentUser = null;
    let radios = [];
    let currentFilter = 'all';
    let currentPlayingId = null;
    let currentView = 'grid';
    let editId = null;
    let editMode = false;
    let audio = new Audio();
    audio.volume = 0.8;
    let unsubscribeRadios = null;
    let currentCloudinaryUrl = null;

    function showToast(icon, title) {
      Swal.fire({ toast: true, position: 'top-end', icon, title, showConfirmButton: false, timer: 3000, background: '#1e293b', color: '#fff' });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    async function uploadToCloudinary(file) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
      const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
        method: 'POST', body: formData
      });
      if(!response.ok) throw new Error('فشل الرفع');
      const data = await response.json();
      return data.secure_url;
    }

    async function saveOrder() {
      if(!currentUser) return;
      const order = radios.map(r => r.id);
      await db.collection('users').doc(currentUser.uid).collection('settings').doc('preferences').set({ order }, { merge: true });
    }

    function listenToRadios() {
      if(unsubscribeRadios) unsubscribeRadios();
      if(!currentUser) return;
      
      unsubscribeRadios = db.collection('users').doc(currentUser.uid).collection('radios').onSnapshot(async (snapshot) => {
        const settingsDoc = await db.collection('users').doc(currentUser.uid).collection('settings').doc('preferences').get();
        const savedOrder = settingsDoc.exists ? settingsDoc.data().order : [];
        
        radios = [];
        snapshot.forEach(docSnap => {
          radios.push({ id: docSnap.id, ...docSnap.data(), favorite: docSnap.data().favorite || false });
        });
        
        if(savedOrder && savedOrder.length) {
          radios.sort((a,b) => {
            const ia = savedOrder.indexOf(a.id);
            const ib = savedOrder.indexOf(b.id);
            if(ia === -1) return 1;
            if(ib === -1) return -1;
            return ia - ib;
          });
        }
        renderRadios();
        hideSplash();
      });
    }

    async function toggleFavorite(id) {
      const station = radios.find(r => r.id == id);
      const newFav = !station.favorite;
      await db.collection('users').doc(currentUser.uid).collection('radios').doc(id).update({ favorite: newFav });
      showToast('success', newFav ? 'أضيفت للمفضلة ❤️' : 'أزيلت من المفضلة 💔');
    }

    function playRadio(id) {
      const station = radios.find(r => r.id == id);
      if(!station) return;
      currentPlayingId = id;
      audio.src = station.streamUrl;
      audio.play().catch(() => showToast('error', 'لا يمكن تشغيل البث'));
      document.getElementById('miniPlayer').classList.remove('hidden');
      document.getElementById('playerTitle').innerText = station.name;
      document.getElementById('playerImage').src = station.imageUrl || 'https://placehold.co/200x200/1e293b/22c55e?text=Radio';
      document.getElementById('playPauseBtn').innerHTML = '⏸';
      showToast('success', `🎵 تشغيل ${station.name}`);
    }

    function openEditMenu(id) {
      Swal.fire({
        title: 'خيارات المحطة',
        showCancelButton: true,
        confirmButtonText: '✏️ تعديل',
        cancelButtonText: '❌ إلغاء',
        denyButtonText: '🗑️ حذف',
        showDenyButton: true,
        background: '#1e293b',
        color: 'white'
      }).then(async (result) => {
        if(result.isConfirmed) {
          editRadio(id);
        } else if(result.isDenied) {
          deleteRadio(id);
        }
      });
    }

    async function deleteRadio(id) {
      const result = await Swal.fire({ title: 'حذف المحطة؟', text: 'لا يمكن التراجع', icon: 'warning', showCancelButton: true, confirmButtonText: 'نعم' });
      if(result.isConfirmed) {
        await db.collection('users').doc(currentUser.uid).collection('radios').doc(id).delete();
        if(currentPlayingId == id) { audio.pause(); document.getElementById('miniPlayer').classList.add('hidden'); }
        showToast('success', 'تم الحذف');
      }
    }

    async function editRadio(id) {
      const radio = radios.find(r => r.id == id);
      editId = id;
      document.getElementById('modalTitle').innerText = '✏️ تعديل المحطة';
      document.getElementById('radioName').value = radio.name;
      document.getElementById('radioUrl').value = radio.streamUrl;
      document.getElementById('radioCategory').value = radio.category || '';
      currentCloudinaryUrl = radio.imageUrl;
      if(currentCloudinaryUrl) {
        document.getElementById('imagePreview').classList.remove('hidden');
        document.getElementById('previewImg').src = currentCloudinaryUrl;
      } else {
        document.getElementById('imagePreview').classList.add('hidden');
      }
      document.getElementById('deleteFromModalBtn').classList.remove('hidden');
      document.getElementById('radioModal').classList.remove('hidden');
    }

    function renderRadios() {
      const grid = document.getElementById('radioGrid');
      let filtered = [...radios];
      if(currentFilter === 'favorites') filtered = radios.filter(r => r.favorite);
      
      if(filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-radio" style="font-size:48px"></i><h3>لا توجد محطات</h3><p>أضف محطتك الأولى</p></div>';
        return;
      }
      
      grid.innerHTML = filtered.map(radio => `
        <div class="radio-card ${editMode ? 'edit-mode' : ''}" data-id="${radio.id}" draggable="${editMode}">
          ${editMode ? '<div class="drag-handle"><i class="fas fa-arrows-alt"></i></div>' : ''}
          <div class="menu-dots" onclick="event.stopPropagation(); openEditMenu('${radio.id}')">
            <i class="fas fa-ellipsis-v"></i>
          </div>
          <img src="${radio.imageUrl || 'https://placehold.co/400x300/1e293b/22c55e?text=Radio'}" 
               onerror="this.src='https://placehold.co/400x300/1e293b/22c55e?text=Radio'"
               ondblclick="event.stopPropagation(); toggleFavorite('${radio.id}')">
          <h3>${escapeHtml(radio.name)}</h3>
        </div>
      `).join('');
      
      document.querySelectorAll('.radio-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if(!editMode && !e.target.closest('.menu-dots') && !e.target.closest('.drag-handle')) {
            playRadio(card.dataset.id);
          }
        });
      });
      
      if(editMode) {
        enableDragAndDrop();
      }
    }

    function enableDragAndDrop() {
      const cards = document.querySelectorAll('.radio-card');
      let dragSrc = null;
      
      cards.forEach(card => {
        card.setAttribute('draggable', 'true');
        card.addEventListener('dragstart', (e) => {
          dragSrc = card;
          e.dataTransfer.effectAllowed = 'move';
          card.classList.add('dragging');
        });
        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
        });
        card.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
        });
        card.addEventListener('drop', async (e) => {
          e.preventDefault();
          if(dragSrc !== card) {
            const fromId = dragSrc.dataset.id;
            const toId = card.dataset.id;
            const fromIndex = radios.findIndex(r => r.id == fromId);
            const toIndex = radios.findIndex(r => r.id == toId);
            const [moved] = radios.splice(fromIndex, 1);
            radios.splice(toIndex, 0, moved);
            renderRadios();
            await saveOrder();
            showToast('success', 'تم تحديث الترتيب');
          }
        });
      });
    }

    // ========== إدارة الملف الشخصي ==========
    async function loadProfile() {
      if(!currentUser) return;
      document.getElementById('profileName').innerText = currentUser.displayName || 'مستخدم';
      document.getElementById('profileEmail').innerText = currentUser.email;
      
      // تحميل صورة الملف الشخصي من Firestore
      const userDoc = await db.collection('users').doc(currentUser.uid).collection('settings').doc('profile').get();
      if(userDoc.exists && userDoc.data().avatarUrl) {
        document.getElementById('profileAvatar').src = userDoc.data().avatarUrl;
      }
    }

    async function updateProfileName(newName) {
      await currentUser.updateProfile({ displayName: newName });
      await db.collection('users').doc(currentUser.uid).collection('settings').doc('profile').set({ name: newName }, { merge: true });
      showToast('success', 'تم تحديث الاسم');
      loadProfile();
    }

    async function updateProfileAvatar(file) {
      try {
        const url = await uploadToCloudinary(file);
        await db.collection('users').doc(currentUser.uid).collection('settings').doc('profile').set({ avatarUrl: url }, { merge: true });
        document.getElementById('profileAvatar').src = url;
        showToast('success', 'تم تحديث الصورة الشخصية');
      } catch(err) {
        showToast('error', 'فشل رفع الصورة');
      }
    }

    // ========== أحداث الصفحة ==========
    document.getElementById('registerBtn').onclick = async () => {
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirmPassword').value;
      if(password !== confirm) return showToast('error', 'كلمتا المرور غير متطابقتين');
      try {
        const userCred = await auth.createUserWithEmailAndPassword(email, password);
        await userCred.user.updateProfile({ displayName: name });
        await userCred.user.sendEmailVerification();
        showToast('success', 'تم التسجيل! راجع بريدك لتفعيل الحساب');
        await auth.signOut();
      } catch(err) { showToast('error', err.message); }
    };

    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      try {
        const userCred = await auth.signInWithEmailAndPassword(email, password);
        if(!userCred.user.emailVerified) {
          await auth.signOut();
          showToast('error', 'يرجى تأكيد بريدك الإلكتروني أولاً');
        }
      } catch(err) { showToast('error', 'بيانات غير صحيحة'); }
    };

    document.getElementById('googleLoginBtn').onclick = async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch(err) { showToast('error', err.message); }
    };

    document.getElementById('showRegister').onclick = () => {
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('registerCard').classList.remove('hidden');
    };
    document.getElementById('showLogin').onclick = () => {
      document.getElementById('registerCard').classList.add('hidden');
      document.getElementById('loginCard').classList.remove('hidden');
    };

    // زر إضافة قناة
    document.getElementById('addRadioBtn').onclick = () => {
      editId = null;
      document.getElementById('modalTitle').innerText = '➕ محطة جديدة';
      document.getElementById('radioName').value = '';
      document.getElementById('radioUrl').value = '';
      document.getElementById('radioCategory').value = '';
      currentCloudinaryUrl = null;
      document.getElementById('imagePreview').classList.add('hidden');
      document.getElementById('deleteFromModalBtn').classList.add('hidden');
      document.getElementById('radioModal').classList.remove('hidden');
    };

    // حفظ القناة
    document.getElementById('saveRadioBtn').onclick = async () => {
      const name = document.getElementById('radioName').value.trim();
      const streamUrl = document.getElementById('radioUrl').value.trim();
      if(!name || !streamUrl) return showToast('warning', 'املأ الحقول المطلوبة');
      
      const data = {
        name, streamUrl,
        category: document.getElementById('radioCategory').value.trim() || 'عام',
        imageUrl: currentCloudinaryUrl || null,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      
      if(editId) {
        await db.collection('users').doc(currentUser.uid).collection('radios').doc(editId).update(data);
        showToast('success', 'تم التعديل');
      } else {
        data.favorite = false;
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('users').doc(currentUser.uid).collection('radios').add(data);
        showToast('success', 'تمت الإضافة');
      }
      
      document.getElementById('radioModal').classList.add('hidden');
    };

    document.getElementById('deleteFromModalBtn').onclick = async () => {
      if(editId) {
        await deleteRadio(editId);
        document.getElementById('radioModal').classList.add('hidden');
      }
    };

    // رفع الصورة للقناة
    const imageUploadArea = document.getElementById('imageUploadArea');
    const imageInput = document.getElementById('radioImage');
    imageUploadArea.onclick = () => imageInput.click();
    imageInput.onchange = async (e) => {
      const file = e.target.files[0];
      if(!file) return;
      document.getElementById('uploadProgress').classList.remove('hidden');
      try {
        const url = await uploadToCloudinary(file);
        currentCloudinaryUrl = url;
        document.getElementById('imagePreview').classList.remove('hidden');
        document.getElementById('previewImg').src = url;
        showToast('success', 'تم رفع الصورة');
      } catch(err) { showToast('error', 'فشل الرفع'); }
      document.getElementById('uploadProgress').classList.add('hidden');
    };

    document.getElementById('closeModalBtn').onclick = () => document.getElementById('radioModal').classList.add('hidden');

    // زر الملف الشخصي
    document.getElementById('profileBtn').onclick = async () => {
      await loadProfile();
      document.getElementById('app').classList.add('hidden');
      document.getElementById('profileContainer').classList.remove('hidden');
    };

    document.getElementById('backToAppBtn').onclick = () => {
      document.getElementById('profileContainer').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
    };

    // تعديل الاسم
    document.getElementById('editProfileBtn').onclick = () => {
      document.getElementById('editNameInput').classList.remove('hidden');
      document.getElementById('editNameInput').value = currentUser.displayName || '';
      document.getElementById('editProfileBtn').classList.add('hidden');
      document.getElementById('saveNameBtn').classList.remove('hidden');
    };

    document.getElementById('saveNameBtn').onclick = async () => {
      const newName = document.getElementById('editNameInput').value.trim();
      if(newName) {
        await updateProfileName(newName);
        document.getElementById('editNameInput').classList.add('hidden');
        document.getElementById('editProfileBtn').classList.remove('hidden');
        document.getElementById('saveNameBtn').classList.add('hidden');
      }
    };

    // رفع الصورة الشخصية
    document.getElementById('profileImageInput').onchange = async (e) => {
      const file = e.target.files[0];
      if(file) await updateProfileAvatar(file);
    };

    document.getElementById('logoutBtn').onclick = async () => {
      await auth.signOut();
      audio.pause();
      document.getElementById('miniPlayer').classList.add('hidden');
    };

    // تبديل وضع الترتيب
    document.getElementById('toggleEditModeBtn').onclick = () => {
      editMode = !editMode;
      document.getElementById('toggleEditModeBtn').style.background = editMode ? '#22c55e' : '#f59e0b';
      document.getElementById('toggleEditModeBtn').innerHTML = editMode ? '✓ إنهاء الترتيب' : '✋ وضع الترتيب';
      renderRadios();
    };

    // تبديل العرض
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        const appDiv = document.getElementById('app');
        appDiv.classList.remove('vertical-view', 'circle-view');
        if(currentView === 'vertical') appDiv.classList.add('vertical-view');
        else if(currentView === 'circle') appDiv.classList.add('circle-view');
        renderRadios();
      };
    });

    // تحكمات المشغل
    document.getElementById('playPauseBtn').onclick = () => {
      if(audio.paused) { audio.play(); document.getElementById('playPauseBtn').innerHTML = '⏸'; }
      else { audio.pause(); document.getElementById('playPauseBtn').innerHTML = '▶'; }
    };
    document.getElementById('prevBtn').onclick = () => {
      if(radios.length && currentPlayingId) {
        let idx = radios.findIndex(r => r.id == currentPlayingId);
        idx = (idx - 1 + radios.length) % radios.length;
        playRadio(radios[idx].id);
      }
    };
    document.getElementById('nextBtn').onclick = () => {
      if(radios.length && currentPlayingId) {
        let idx = radios.findIndex(r => r.id == currentPlayingId);
        idx = (idx + 1) % radios.length;
        playRadio(radios[idx].id);
      }
    };
    document.getElementById('volumeSlider').oninput = (e) => audio.volume = e.target.value;
    document.getElementById('searchInput').oninput = (e) => {
      const val = e.target.value.toLowerCase();
      document.querySelectorAll('.radio-card').forEach(card => {
        const title = card.querySelector('h3')?.innerText.toLowerCase() || '';
        card.style.display = title.includes(val) ? '' : 'none';
      });
    };

    document.querySelectorAll('.menu-item').forEach(item => {
      item.onclick = () => {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentFilter = item.dataset.filter;
        renderRadios();
        const titles = { all: '📻 جميع المحطات', favorites: '❤️ المفضلة' };
        document.getElementById('pageTitle').innerText = titles[currentFilter];
      };
    });

    // مراقبة المصادقة
    auth.onAuthStateChanged((user) => {
      if(user && user.emailVerified) {
        currentUser = user;
        document.getElementById('authContainer').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('profileContainer').classList.add('hidden');
        listenToRadios();
        loadProfile();
        hideSplash();
      } else if(user && !user.emailVerified) {
        auth.signOut();
        document.getElementById('authContainer').classList.remove('hidden');
        document.getElementById('app').classList.add('hidden');
        hideSplash();
        showToast('warning', 'يرجى تأكيد بريدك الإلكتروني');
      } else {
        currentUser = null;
        document.getElementById('app').classList.add('hidden');
        document.getElementById('profileContainer').classList.add('hidden');
        document.getElementById('authContainer').classList.remove('hidden');
        document.getElementById('miniPlayer').classList.add('hidden');
        audio.pause();
        hideSplash();
      }
    });

    function hideSplash() {
      const splash = document.getElementById('splash-screen');
      if(splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 500); }
    }
    setTimeout(() => hideSplash(), 3000);
  </script>
</body>
</html>
