<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🎧 Radio Streaming App | Live Radio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .hidden {
      display: none !important;
    }

    /* Splash Screen */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #020617, #0f172a);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loader-wrapper {
      text-align: center;
      animation: fadeInUp 0.8s ease;
    }

    .loader {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid rgba(34, 197, 94, 0.1);
      border-top: 4px solid #22c55e;
      border-right: 4px solid #3b82f6;
      animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      margin: auto;
    }

    .loader-wrapper h1 {
      margin-top: 30px;
      font-size: 2rem;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Glassmorphism */
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    /* Auth Container */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .auth-card {
      width: 100%;
      max-width: 450px;
      border-radius: 32px;
      padding: 50px 40px;
      animation: fadeInUp 0.6s ease;
      transition: transform 0.3s ease;
    }

    .auth-card:hover {
      transform: translateY(-5px);
    }

    .auth-card h2 {
      margin-bottom: 30px;
      text-align: center;
      font-size: 2rem;
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .auth-card input {
      width: 100%;
      padding: 16px 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      outline: none;
      border-radius: 16px;
      margin-bottom: 18px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .auth-card input:focus {
      border-color: #22c55e;
      background: rgba(255, 255, 255, 0.12);
    }

    .auth-card button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      transition: all 0.3s ease;
    }

    .auth-card button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
    }

    .google-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626) !important;
      margin-top: 10px;
    }

    .auth-card p {
      margin-top: 20px;
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
    }

    .auth-card span {
      color: #22c55e;
      cursor: pointer;
      font-weight: bold;
      margin-right: 5px;
    }

    /* App Layout */
    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 300px;
      padding: 30px 25px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar h1 {
      margin-bottom: 30px;
      font-size: 1.8rem;
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sidebar button {
      border: none;
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .sidebar button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
    }

    #searchInput {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    .menu {
      margin-top: 20px;
    }

    .menu-item {
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(-5px);
    }

    .menu-item.active {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(59, 130, 246, 0.2));
      color: white;
      border-left: 3px solid #22c55e;
    }

    .logout-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626) !important;
    }

    .main-content {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .topbar {
      margin-bottom: 30px;
    }

    .topbar h2 {
      font-size: 2rem;
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Radio Grid */
    .radio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }

    .radio-card {
      padding: 20px;
      border-radius: 24px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeIn 0.5s ease;
    }

    .radio-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .radio-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 15px;
    }

    .radio-card h3 {
      margin-bottom: 8px;
      font-size: 1.2rem;
    }

    .radio-card p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.85rem;
      margin-bottom: 15px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-actions button {
      flex: 1;
      border: none;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .play-btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .delete-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    .edit-btn {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
    }

    .favorite-btn {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    .modal-content {
      width: 100%;
      max-width: 550px;
      padding: 40px;
      border-radius: 32px;
    }

    .modal-content h2 {
      margin-bottom: 25px;
      text-align: center;
    }

    .modal-content input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      margin-bottom: 15px;
    }

    .modal-content input[type="file"] {
      padding: 10px;
    }

    .modal-content button {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    #saveRadioBtn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    #closeModalBtn {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    /* Mini Player */
    .mini-player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 90px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 1000;
      animation: fadeInUp 0.5s ease;
    }

    .player-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .player-left img {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      object-fit: cover;
    }

    .player-left h4 {
      font-size: 1rem;
      margin-bottom: 5px;
    }

    .player-left span {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .player-controls button {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 18px;
      transition: all 0.3s ease;
    }

    .player-controls button:hover {
      transform: scale(1.1);
    }

    .volume-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .volume-wrapper input {
      width: 100px;
      height: 4px;
      border-radius: 5px;
      cursor: pointer;
    }

    /* Responsive */
    @media (max-width: 992px) {
      .app {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
      }

      .mini-player {
        flex-direction: column;
        height: auto;
        padding: 15px;
        gap: 15px;
      }
    }

    @media (max-width: 576px) {
      .auth-card, .modal-content {
        padding: 30px 20px;
      }

      .radio-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="loader-wrapper">
      <div class="loader"></div>
      <h1>🎧 RADIO LIVE</h1>
    </div>
  </div>

  <!-- Auth Container -->
  <div class="auth-container" id="authContainer">
    <div class="glass-card auth-card" id="loginCard">
      <h2><i class="fas fa-headphones"></i> تسجيل الدخول</h2>
      <input type="email" id="loginEmail" placeholder="📧 البريد الإلكتروني">
      <input type="password" id="loginPassword" placeholder="🔒 كلمة المرور">
      <button id="loginBtn"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</button>
      <button class="google-btn" id="googleLoginBtn">
        <i class="fab fa-google"></i> تسجيل الدخول عبر Google
      </button>
      <p>ليس لديك حساب؟ <span id="showRegister">إنشاء حساب</span></p>
      <p><span id="forgotPasswordBtn" style="color:#f59e0b;">نسيت كلمة المرور؟</span></p>
    </div>

    <div class="glass-card auth-card hidden" id="registerCard">
      <h2><i class="fas fa-user-plus"></i> إنشاء حساب</h2>
      <input type="text" id="registerName" placeholder="👤 الاسم الكامل">
      <input type="email" id="registerEmail" placeholder="📧 البريد الإلكتروني">
      <input type="password" id="registerPassword" placeholder="🔒 كلمة المرور">
      <input type="password" id="registerConfirmPassword" placeholder="✅ تأكيد كلمة المرور">
      <button id="registerBtn"><i class="fas fa-check-circle"></i> إنشاء حساب</button>
      <p>لديك حساب بالفعل؟ <span id="showLogin">تسجيل الدخول</span></p>
    </div>
  </div>

  <!-- Main App -->
  <div class="app hidden" id="app">
    <aside class="sidebar glass-card">
      <div>
        <h1><i class="fas fa-radio"></i> RADIO</h1>
        <button id="addRadioBtn"><i class="fas fa-plus"></i> إضافة محطة</button>
        <input type="text" id="searchInput" placeholder="🔍 بحث عن محطة...">
        <div class="menu">
          <div class="menu-item active" data-filter="all">🏠 الرئيسية</div>
          <div class="menu-item" data-filter="favorites">❤️ المفضلة</div>
          <div class="menu-item" data-filter="recent">🕒 آخر تشغيل</div>
        </div>
      </div>
      <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <h2>📻 جميع المحطات</h2>
      </div>
      <div class="radio-grid" id="radioGrid">
        <div class="glass-card" style="padding: 40px; text-align: center; grid-column: 1/-1;">
          <i class="fas fa-info-circle" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;"></i>
          <h3>مرحباً بك في تطبيق الراديو</h3>
          <p style="margin-top: 10px;">قم بإضافة محطاتك المفضلة للبدء</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Radio Modal -->
  <div class="modal hidden" id="radioModal">
    <div class="modal-content glass-card">
      <h2><i class="fas fa-plus-circle"></i> إضافة محطة جديدة</h2>
      <input type="text" id="radioName" placeholder="📻 اسم المحطة">
      <input type="text" id="radioUrl" placeholder="🔗 رابط البث المباشر">
      <input type="text" id="radioCategory" placeholder="🏷️ التصنيف">
      <input type="file" id="radioImage" accept="image/*">
      <button id="saveRadioBtn"><i class="fas fa-save"></i> حفظ المحطة</button>
      <button id="closeModalBtn"><i class="fas fa-times"></i> إغلاق</button>
    </div>
  </div>

  <!-- Mini Player -->
  <div class="mini-player hidden" id="miniPlayer">
    <div class="player-left">
      <img id="playerImage" src="" alt="station">
      <div>
        <h4 id="playerTitle">لا توجد محطة</h4>
        <span>🎵 راديو مباشر</span>
      </div>
    </div>
    <div class="player-controls">
      <button id="prevBtn"><i class="fas fa-backward"></i></button>
      <button id="playPauseBtn"><i class="fas fa-play"></i></button>
      <button id="nextBtn"><i class="fas fa-forward"></i></button>
    </div>
    <div class="volume-wrapper">
      <i class="fas fa-volume-up"></i>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
    </div>
  </div>

  <script>
    // Remove splash screen after 2 seconds
    setTimeout(() => {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => {
          splash.style.display = 'none';
          // Show auth container (for demo without Firebase)
          document.getElementById('authContainer').classList.remove('hidden');
        }, 500);
      }
    }, 2000);

    // Demo mode - Local storage based app (works without Firebase)
    // This allows you to test the app immediately
    
    let radios = JSON.parse(localStorage.getItem('demo_radios')) || [];
    let currentIndex = 0;
    let currentFilter = 'all';
    const audio = new Audio();
    audio.volume = 0.8;
    
    // Sample radio stations
    if (radios.length === 0) {
      radios = [
        {
          id: '1',
          name: 'BBC Radio 1',
          streamUrl: 'https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one',
          category: 'Music',
          imageUrl: 'https://upload.wikimedia.org/wikipedia/en/thumb/5/5e/BBC_Radio_1_2021.svg/1200px-BBC_Radio_1_2021.svg.png',
          favorite: false
        },
        {
          id: '2',
          name: 'Virgin Radio',
          streamUrl: 'https://radio.virginradio.co.uk/stream',
          category: 'Pop',
          imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Virgin_Radio_logo.svg/1200px-Virgin_Radio_logo.svg.png',
          favorite: false
        },
        {
          id: '3',
          name: 'Nostalgie',
          streamUrl: 'https://stream.nostalgie.fr/hls/live.m3u8',
          category: 'Oldies',
          imageUrl: 'https://upload.wikimedia.org/wikipedia/fr/thumb/3/3e/Nostalgie_logo.svg/1200px-Nostalgie_logo.svg.png',
          favorite: false
        }
      ];
      localStorage.setItem('demo_radios', JSON.stringify(radios));
    }
    
    function showToast(icon, title) {
      Swal.fire({
        toast: true,
        position: 'top-end',
        icon: icon,
        title: title,
        showConfirmButton: false,
        timer: 3000,
        background: '#1e293b',
        color: '#fff'
      });
    }
    
    function renderRadios() {
      const radioGrid = document.getElementById('radioGrid');
      let filteredRadios = [...radios];
      
      if (currentFilter === 'favorites') {
        filteredRadios = radios.filter(r => r.favorite);
      } else if (currentFilter === 'recent') {
        const recent = JSON.parse(localStorage.getItem('recentlyPlayed') || '[]');
        filteredRadios = recent.map(id => radios.find(r => r.id === id)).filter(Boolean);
      }
      
      if (filteredRadios.length === 0) {
        radioGrid.innerHTML = `
          <div class="glass-card" style="padding: 40px; text-align: center; grid-column: 1/-1;">
            <i class="fas fa-radio" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;"></i>
            <h3>لا توجد محطات</h3>
            <p style="margin-top: 10px;">اضغط على "إضافة محطة" لإضافة محطتك الأولى</p>
          </div>
        `;
        return;
      }
      
      radioGrid.innerHTML = filteredRadios.map((radio, idx) => `
        <div class="radio-card glass-card">
          <img src="${radio.imageUrl}" alt="${radio.name}" onerror="this.src='https://via.placeholder.com/300x200?text=Radio'">
          <h3>${radio.name}</h3>
          <p><i class="fas fa-tag"></i> ${radio.category}</p>
          <div class="card-actions">
            <button class="play-btn" onclick="playRadio('${radio.id}')">
              <i class="fas fa-play"></i> تشغيل
            </button>
            <button class="favorite-btn" onclick="toggleFavorite('${radio.id}')">
              <i class="fas fa-heart"></i> ${radio.favorite ? 'مفضلة' : 'مفضلة'}
            </button>
            <button class="edit-btn" onclick="editRadio('${radio.id}')">
              <i class="fas fa-edit"></i>
            </button>
            <button class="delete-btn" onclick="deleteRadio('${radio.id}')">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
      `).join('');
    }
    
    window.playRadio = function(id) {
      const station = radios.find(r => r.id === id);
      if (!station) return;
      
      currentIndex = radios.findIndex(r => r.id === id);
      audio.src = station.streamUrl;
      audio.play().catch(e => showToast('error', 'لا يمكن تشغيل هذا الرابط'));
      
      document.getElementById('miniPlayer').classList.remove('hidden');
      document.getElementById('playerTitle').innerText = station.name;
      document.getElementById('playerImage').src = station.imageUrl;
      document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
      
      // Save to recently played
      let recent = JSON.parse(localStorage.getItem('recentlyPlayed') || '[]');
      recent = [id, ...recent.filter(i => i !== id)].slice(0, 10);
      localStorage.setItem('recentlyPlayed', JSON.stringify(recent));
      
      showToast('success', `تشغيل ${station.name}`);
    };
    
    window.toggleFavorite = function(id) {
      const index = radios.findIndex(r => r.id === id);
      if (index !== -1) {
        radios[index].favorite = !radios[index].favorite;
        localStorage.setItem('demo_radios', JSON.stringify(radios));
        renderRadios();
        showToast('success', radios[index].favorite ? 'تمت الإضافة إلى المفضلة' : 'تمت الإزالة من المفضلة');
      }
    };
    
    window.deleteRadio = function(id) {
      Swal.fire({
        title: 'هل أنت متأكد؟',
        text: 'لن تتمكن من استعادة هذه المحطة!',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#22c55e',
        confirmButtonText: 'نعم، احذف',
        cancelButtonText: 'إلغاء'
      }).then((result) => {
        if (result.isConfirmed) {
          radios = radios.filter(r => r.id !== id);
          localStorage.setItem('demo_radios', JSON.stringify(radios));
          renderRadios();
          showToast('success', 'تم حذف المحطة بنجاح');
        }
      });
    };
    
    window.editRadio = async function(id) {
      const radio = radios.find(r => r.id === id);
      const { value: formValues } = await Swal.fire({
        title: 'تعديل المحطة',
        html: `
          <input id="swal-name" class="swal2-input" placeholder="اسم المحطة" value="${radio.name}">
          <input id="swal-url" class="swal2-input" placeholder="رابط البث" value="${radio.streamUrl}">
          <input id="swal-category" class="swal2-input" placeholder="التصنيف" value="${radio.category}">
        `,
        focusConfirm: false,
        preConfirm: () => {
          return {
            name: document.getElementById('swal-name').value,
            streamUrl: document.getElementById('swal-url').value,
            category: document.getElementById('swal-category').value
          }
        }
      });
      
      if (formValues && formValues.name && formValues.streamUrl) {
        const index = radios.findIndex(r => r.id === id);
        radios[index].name = formValues.name;
        radios[index].streamUrl = formValues.streamUrl;
        radios[index].category = formValues.category || 'عام';
        localStorage.setItem('demo_radios', JSON.stringify(radios));
        renderRadios();
        showToast('success', 'تم تحديث المحطة');
      }
    };
    
    // Event Listeners
    document.getElementById('playPauseBtn')?.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
      } else {
        audio.pause();
        document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play"></i>';
      }
    });
    
    document.getElementById('prevBtn')?.addEventListener('click', () => {
      if (radios.length > 0) {
        currentIndex = (currentIndex - 1 + radios.length) % radios.length;
        playRadio(radios[currentIndex].id);
      }
    });
    
    document.getElementById('nextBtn')?.addEventListener('click', () => {
      if (radios.length > 0) {
        currentIndex = (currentIndex + 1) % radios.length;
        playRadio(radios[currentIndex].id);
      }
    });
    
    document.getElementById('volumeSlider')?.addEventListener('input', (e) => {
      audio.volume = e.target.value;
    });
    
    document.getElementById('searchInput')?.addEventListener('input', (e) => {
      const value = e.target.value.toLowerCase();
      const cards = document.querySelectorAll('.radio-card');
      cards.forEach(card => {
        const title = card.querySelector('h3')?.innerText.toLowerCase() || '';
        card.style.display = title.includes(value) ? 'block' : 'none';
      });
    });
    
    document.getElementById('addRadioBtn')?.addEventListener('click', () => {
      document.getElementById('radioModal').classList.remove('hidden');
    });
    
    document.getElementById('closeModalBtn')?.addEventListener('click', () => {
      document.getElementById('radioModal').classList.add('hidden');
      document.getElementById('radioName').value = '';
      document.getElementById('radioUrl').value = '';
      document.getElementById('radioCategory').value = '';
      document.getElementById('radioImage').value = '';
    });
    
    document.getElementById('saveRadioBtn')?.addEventListener('click', () => {
      const name = document.getElementById('radioName').value;
      const streamUrl = document.getElementById('radioUrl').value;
      const category = document.getElementById('radioCategory').value || 'عام';
      const imageFile = document.getElementById('radioImage').files[0];
      
      if (!name || !streamUrl) {
        return showToast('warning', 'يرجى إدخال اسم المحطة ورابط البث');
      }
      
      const newRadio = {
        id: Date.now().toString(),
        name: name,
        streamUrl: streamUrl,
        category: category,
        imageUrl: imageFile ? URL.createObjectURL(imageFile) : 'https://via.placeholder.com/300x200?text=Radio',
        favorite: false
      };
      
      radios.push(newRadio);
      localStorage.setItem('demo_radios', JSON.stringify(radios));
      renderRadios();
      document.getElementById('radioModal').classList.add('hidden');
      showToast('success', 'تمت إضافة المحطة بنجاح');
      
      // Clear form
      document.getElementById('radioName').value = '';
      document.getElementById('radioUrl').value = '';
      document.getElementById('radioCategory').value = '';
      document.getElementById('radioImage').value = '';
    });
    
    // Menu filter
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentFilter = item.getAttribute('data-filter');
        renderRadios();
      });
    });
    
    // Auth UI (Demo - just show app after login click)
    document.getElementById('showRegister')?.addEventListener('click', () => {
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('registerCard').classList.remove('hidden');
    });
    
    document.getElementById('showLogin')?.addEventListener('click', () => {
      document.getElementById('registerCard').classList.add('hidden');
      document.getElementById('loginCard').classList.remove('hidden');
    });
    
    document.getElementById('loginBtn')?.addEventListener('click', () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      
      if (!email || !password) {
        return showToast('error', 'يرجى إدخال البريد الإلكتروني وكلمة المرور');
      }
      
      // Demo login - just show the app
      document.getElementById('authContainer').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      renderRadios();
      showToast('success', 'مرحباً بك في تطبيق الراديو!');
    });
    
    document.getElementById('googleLoginBtn')?.addEventListener('click', () => {
      document.getElementById('authContainer').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      renderRadios();
      showToast('success', 'تم تسجيل الدخول عبر Google (وضع التجربة)');
    });
    
    document.getElementById('registerBtn')?.addEventListener('click', () => {
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirmPassword').value;
      
      if (!name || !email || !password) {
        return showToast('error', 'يرجى تعبئة جميع الحقول');
      }
      
      if (password !== confirm) {
        return showToast('error', 'كلمتا المرور غير متطابقتين');
      }
      
      showToast('success', 'تم إنشاء الحساب بنجاح! يرجى تسجيل الدخول');
      document.getElementById('registerCard').classList.add('hidden');
      document.getElementById('loginCard').classList.remove('hidden');
    });
    
    document.getElementById('forgotPasswordBtn')?.addEventListener('click', () => {
      Swal.fire({
        title: 'استعادة كلمة المرور',
        text: 'سيتم إرسال رابط إعادة التعيين إلى بريدك الإلكتروني',
        icon: 'info',
        confirmButtonText: 'حسناً'
      });
    });
    
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      document.getElementById('app').classList.add('hidden');
      document.getElementById('authContainer').classList.remove('hidden');
      audio.pause();
      showToast('success', 'تم تسجيل الخروج');
    });
    
    // Initial render
    renderRadios();
  </script>
</body>
</html>
