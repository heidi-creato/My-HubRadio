<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>راديو نجوم | Radio Nujoom</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    :root {
      --bg-primary: linear-gradient(135deg, #f5f7fa 0%, #eef2f7 100%);
      --bg-card: rgba(255,255,255,0.9);
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border: rgba(224, 224, 230, 0.5);
      --shadow: 0 8px 20px rgba(0,0,0,0.05);
      --shadow-hover: 0 12px 24px -12px rgba(0,0,0,0.15);
      --nav-bg: rgba(255,255,255,0.8);
      --input-bg: #f8fafc;
      --toast-bg: #1e293b;
      --toast-text: white;
      --player-bg: rgba(255,255,255,0.96);
      --glass-blur: blur(12px);
      --accent: #22c55e;
    }
    body.dark {
      --bg-primary: linear-gradient(135deg, #0f172a 0%, #020617 100%);
      --bg-card: rgba(30,41,59,0.9);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: rgba(71, 85, 105, 0.6);
      --shadow: 0 8px 20px rgba(0,0,0,0.3);
      --shadow-hover: 0 12px 24px -12px rgba(0,0,0,0.4);
      --nav-bg: rgba(15,23,42,0.8);
      --input-bg: #334155;
      --toast-bg: #f1f5f9;
      --toast-text: #1e293b;
      --player-bg: rgba(30,41,59,0.96);
    }
    body { background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding-bottom: 70px; transition: all 0.3s; }
    .hidden { display: none !important; }
    /* Splash screen */
    #splash-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
    .loader { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-status { color: white; font-size: 14px; letter-spacing: 1px; }
    /* Top navigation */
    .top-nav { position: sticky; top: 0; z-index: 100; background: var(--nav-bg); backdrop-filter: var(--glass-blur); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .logo h1 { font-size: 1.5rem; background: linear-gradient(135deg, var(--accent), #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 700; }
    .nav-actions { display: flex; gap: 12px; }
    .icon-btn { background: var(--input-bg); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; color: var(--text-primary); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .icon-btn:hover { background: var(--accent); color: white; transform: scale(1.05); }
    .profile-trigger { background: linear-gradient(135deg, var(--accent), #3b82f6); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; }
    /* User dropdown */
    .user-dropdown { position: absolute; top: 70px; right: 24px; background: var(--bg-card); backdrop-filter: var(--glass-blur); border-radius: 20px; width: 280px; box-shadow: var(--shadow); z-index: 200; border: 1px solid var(--border); animation: fadeIn 0.2s; }
    .dropdown-header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
    .dropdown-header img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); }
    .dropdown-header h4 { margin: 10px 0 5px; }
    .dropdown-header p { font-size: 12px; color: var(--text-secondary); }
    .dropdown-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .dropdown-item i { width: 24px; color: var(--accent); }
    .dropdown-item:hover { background: rgba(34,197,94,0.1); }
    .dropdown-divider { height: 1px; background: var(--border); margin: 8px 0; }
    /* View pills */
    .view-bar { display: flex; justify-content: center; gap: 10px; margin: 20px 24px; }
    .view-pill { background: var(--input-bg); border: 1px solid var(--border); padding: 8px 24px; border-radius: 40px; cursor: pointer; color: var(--text-secondary); transition: 0.2s; }
    .view-pill.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 2px 8px rgba(34,197,94,0.3); }
    /* Search */
    #searchContainer { padding: 0 24px 12px; overflow: hidden; transition: 0.3s; max-height: 0; opacity: 0; }
    #searchContainer.show { max-height: 100px; opacity: 1; }
    #searchInput { width: 100%; padding: 12px 16px; border-radius: 30px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-primary); }
    /* Radio grid */
    .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 0 24px 24px; }
    .radio-card { background: var(--bg-card); backdrop-filter: var(--glass-blur); border-radius: 24px; padding: 16px; transition: all 0.25s; cursor: pointer; box-shadow: var(--shadow); border: 1px solid var(--border); position: relative; }
    .radio-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: var(--shadow-hover); }
    .radio-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 20px; margin-bottom: 12px; background: var(--input-bg); }
    .radio-card h3 { font-size: 0.9rem; text-align: center; }
    .menu-dots { position: absolute; top: 12px; right: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .drag-handle { position: absolute; top: 12px; left: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: grab; }
    .vertical-view .radio-grid { display: flex; flex-direction: column; gap: 12px; }
    .vertical-view .radio-card { display: flex; align-items: center; gap: 16px; padding: 12px 20px; }
    .vertical-view .radio-card img { width: 60px; height: 60px; margin: 0; }
    .vertical-view .menu-dots, .vertical-view .drag-handle { position: static; margin: 0 6px; }
    .circle-view .radio-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; }
    .circle-view .radio-card { width: 100px; text-align: center; background: transparent; backdrop-filter: none; box-shadow: none; padding: 8px; }
    .circle-view .radio-card img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 8px; }
    .circle-view .menu-dots, .circle-view .drag-handle { top: 4px; width: 24px; height: 24px; }
    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: var(--bg-card); backdrop-filter: var(--glass-blur); max-width: 500px; width: 90%; padding: 28px; border-radius: 32px; }
    .modal-content input { width: 100%; padding: 12px; margin-bottom: 14px; border: 1px solid var(--border); border-radius: 16px; background: var(--input-bg); color: var(--text-primary); }
    .image-upload-area { border: 2px dashed var(--border); border-radius: 20px; padding: 16px; text-align: center; cursor: pointer; margin-bottom: 12px; }
    /* Mini player */
    .mini-player { position: fixed; bottom: 0; left: 0; right: 0; background: var(--player-bg); backdrop-filter: var(--glass-blur); border-top: 1px solid var(--border); padding: 6px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
    .player-mini-left { display: flex; align-items: center; gap: 12px; }
    .player-mini-avatar { width: 44px; height: 44px; border-radius: 12px; object-fit: cover; cursor: pointer; }
    .player-mini-controls { display: flex; gap: 16px; }
    .player-mini-controls button { background: transparent; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; color: var(--text-primary); transition: 0.2s; display: flex; align-items: center; justify-content: center; }
    .player-mini-controls button:hover { background: rgba(34,197,94,0.2); }
    .player-mini-controls button.primary { background: var(--accent); color: white; }
    .expand-btn { background: transparent; border: none; cursor: pointer; color: var(--text-secondary); font-size: 1.2rem; padding: 8px; transition: 0.2s; }
    /* Expanded player */
    .player-expanded { position: fixed; inset: 0; background: var(--bg-card); backdrop-filter: blur(20px); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; animation: fadeIn 0.3s; }
    .expanded-avatar { width: 220px; height: 220px; border-radius: 30px; object-fit: cover; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3); border: 3px solid var(--accent); }
    .expanded-title { font-size: 1.8rem; font-weight: 700; text-align: center; margin-top: 10px; }
    .expanded-controls { display: flex; gap: 30px; margin: 20px 0; }
    .expanded-controls button { background: transparent; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.8rem; cursor: pointer; color: var(--text-primary); transition: 0.2s; display: flex; align-items: center; justify-content: center; }
    .expanded-controls button.primary { background: var(--accent); color: white; }
    .expanded-volume { display: flex; align-items: center; gap: 16px; width: 80%; max-width: 300px; margin: 10px auto; }
    .expanded-volume input { flex: 1; height: 5px; border-radius: 5px; accent-color: var(--accent); cursor: pointer; }
    .close-expanded { position: absolute; top: 20px; left: 20px; background: transparent; border: none; font-size: 1.8rem; cursor: pointer; color: var(--text-secondary); }
    /* Toast */
    .custom-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--toast-bg); color: var(--toast-text); padding: 8px 20px; border-radius: 40px; font-size: 13px; z-index: 1100; opacity: 0; transition: 0.2s; white-space: nowrap; pointer-events: none; }
    .custom-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* Auth */
    .auth-container { min-height: 100vh; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); border-radius: 40px; padding: 45px 35px; width: 100%; max-width: 450px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); animation: fadeInUp 0.5s; }
    body.dark .auth-card { background: rgba(30,41,59,0.98); }
    .auth-card h2 { font-size: 32px; font-weight: 800; margin-bottom: 30px; text-align: center; background: linear-gradient(135deg, var(--accent), #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .auth-card input { width: 100%; padding: 14px 18px; margin-bottom: 16px; background: #f1f5f9; border: 2px solid #e2e8f0; border-radius: 20px; }
    body.dark .auth-card input { background: #334155; border-color: #475569; color: white; }
    .auth-card input:focus { outline: none; border-color: var(--accent); }
    .auth-card button { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #16a34a); border: none; border-radius: 20px; color: white; font-weight: 700; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
    .auth-card button:hover { transform: translateY(-2px); }
    .google-btn { background: linear-gradient(135deg, #ea4335, #c5221f) !important; }
    .empty-state { text-align: center; padding: 60px; color: var(--text-secondary); }
    @media (max-width: 640px) { .radio-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); } .expanded-avatar { width: 160px; height: 160px; } .expanded-title { font-size: 1.3rem; } }
  </style>
</head>
<body>
<div id="splash-screen"><div class="loader"></div><div id="loading-status">جاري تحميل التطبيق...</div></div>

<div class="auth-container hidden" id="authContainer">
  <div class="auth-card" id="loginCard">
    <h2>✨ مرحباً بك</h2>
    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
    <input type="password" id="loginPassword" placeholder="كلمة المرور">
    <button id="loginBtn">دخول</button>
    <button id="googleLoginBtn" class="google-btn"><i class="fab fa-google"></i> Google</button>
    <p>ليس لديك حساب؟ <span id="showRegister">إنشاء حساب</span></p>
  </div>
  <div class="auth-card hidden" id="registerCard">
    <h2>📝 حساب جديد</h2>
    <input type="text" id="registerName" placeholder="الاسم">
    <input type="email" id="registerEmail" placeholder="البريد الإلكتروني">
    <input type="password" id="registerPassword" placeholder="كلمة المرور">
    <input type="password" id="registerConfirmPassword" placeholder="تأكيد">
    <button id="registerBtn">تسجيل</button>
    <p>لديك حساب؟ <span id="showLogin">دخول</span></p>
  </div>
</div>

<div class="app hidden" id="app">
  <div class="top-nav">
    <div class="logo"><h1>📻 راديو نجوم</h1></div>
    <div class="nav-actions">
      <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
      <button class="icon-btn" id="searchBtn"><i class="fas fa-search"></i></button>
      <button class="icon-btn" id="addRadioBtn"><i class="fas fa-plus"></i></button>
      <div class="profile-trigger" id="profileTrigger"><i class="fas fa-user"></i></div>
    </div>
  </div>
  <div class="user-dropdown hidden" id="userDropdown">
    <div class="dropdown-header">
      <img id="dropdownAvatar" src="https://placehold.co/100x100/e2e8f0/1e293b?text=User">
      <h4 id="dropdownName">اسم المستخدم</h4>
      <p id="dropdownEmail">البريد الإلكتروني</p>
    </div>
    <div class="dropdown-menu">
      <div class="dropdown-item" data-nav="all"><i class="fas fa-home"></i> الرئيسية</div>
      <div class="dropdown-item" data-nav="favorites"><i class="fas fa-heart"></i> المفضلة</div>
      <div class="dropdown-item" id="editModeDropdown"><i class="fas fa-arrows-alt"></i> وضع الترتيب</div>
      <div class="dropdown-divider"></div>
      <div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</div>
    </div>
  </div>
  <div class="view-bar">
    <button class="view-pill active" data-view="grid">شبكي</button>
    <button class="view-pill" data-view="vertical">عمودي</button>
    <button class="view-pill" data-view="circle">دائري</button>
  </div>
  <div id="searchContainer"><input type="text" id="searchInput" placeholder="🔍 ابحث عن محطة..."></div>
  <div id="radioGrid" class="radio-grid"></div>
</div>

<div class="modal hidden" id="radioModal">
  <div class="modal-content">
    <h2 id="modalTitle">➕ محطة جديدة</h2>
    <input type="text" id="radioName" placeholder="اسم المحطة *">
    <input type="text" id="radioUrl" placeholder="رابط البث المباشر * (MP3, M3U8, ...)">
    <input type="text" id="radioCategory" placeholder="التصنيف">
    <div class="image-upload-area" id="imageUploadArea"><i class="fas fa-cloud-upload-alt"></i> اضغط لرفع صورة<input type="file" id="radioImage" accept="image/*" style="display:none"></div>
    <div id="imagePreview" class="upload-preview hidden"><img id="previewImg" style="width:80px;border-radius:16px;"></div>
    <div id="uploadProgress" class="hidden" style="text-align:center; color:var(--accent);">جاري الرفع...</div>
    <button id="saveRadioBtn" style="background:var(--accent); color:white;">💾 حفظ</button>
    <button id="deleteFromModalBtn" class="hidden" style="background:#ef4444; color:white;">🗑️ حذف</button>
    <button id="closeModalBtn" style="background:#94a3b8; color:white;">❌ إلغاء</button>
  </div>
</div>

<div class="mini-player hidden" id="miniPlayer">
  <div class="player-mini-left">
    <img id="playerMiniAvatar" class="player-mini-avatar" src="https://placehold.co/50x50">
    <button class="expand-btn" id="expandPlayerBtn"><i class="fas fa-expand-alt"></i></button>
  </div>
  <div class="player-mini-controls">
    <button id="miniPrevBtn"><i class="fas fa-step-backward"></i></button>
    <button id="miniPlayPauseBtn" class="primary"><i class="fas fa-play"></i></button>
    <button id="miniNextBtn"><i class="fas fa-step-forward"></i></button>
    <button id="miniMuteBtn"><i class="fas fa-volume-up"></i></button>
  </div>
</div>

<div id="expandedPlayer" class="player-expanded hidden">
  <button class="close-expanded" id="closeExpandedBtn"><i class="fas fa-times"></i></button>
  <img id="expandedAvatar" class="expanded-avatar" src="https://placehold.co/220x220">
  <h2 id="expandedTitle" class="expanded-title">اسم المحطة</h2>
  <div class="expanded-controls">
    <button id="expandedPrevBtn"><i class="fas fa-step-backward"></i></button>
    <button id="expandedPlayPauseBtn" class="primary"><i class="fas fa-play"></i></button>
    <button id="expandedNextBtn"><i class="fas fa-step-forward"></i></button>
  </div>
  <div class="expanded-volume">
    <i id="expandedMuteIcon" class="fas fa-volume-up" style="cursor:pointer;"></i>
    <input type="range" id="expandedVolumeSlider" min="0" max="1" step="0.01" value="0.8">
  </div>
</div>

<div id="customToast" class="custom-toast"></div>

<script>
  // ---------- Firebase Config ----------
  const firebaseConfig = {
    apiKey: "AIzaSyBRvU198Ov7i6XdQTiKkuPJ-8biyKQt0Eo",
    authDomain: "radioapp-4f31a.firebaseapp.com",
    projectId: "radioapp-4f31a",
    storageBucket: "radioapp-4f31a.firebasestorage.app",
    messagingSenderId: "109582001862",
    appId: "1:109582001862:web:0f88fc50166c6d3d3019c7"
  };
  const CLOUDINARY_CLOUD_NAME = "dzshfcvkg";
  const CLOUDINARY_UPLOAD_PRESET = "radio_preset";

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ---------- Global variables ----------
  let currentUser = null;
  let radios = [];
  let currentFilter = 'all';
  let currentPlayingId = null;
  let currentView = 'grid';
  let editId = null;
  let editMode = false;
  let audio = new Audio();
  let unsubscribeRadios = null;
  let currentCloudinaryUrl = null;
  let currentImageFile = null;
  let retryCount = 0;
  let retryTimer = null;

  // ---------- Helper functions ----------
  function showToast(msg) {
    const toast = document.getElementById('customToast');
    if (toast) {
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  function hideSplash() {
    const splash = document.getElementById('splash-screen');
    if (splash) {
      splash.style.opacity = '0';
      setTimeout(() => splash.remove(), 500);
    }
  }

  // ---------- Cloudinary upload ----------
  async function uploadToCloudinary(file) {
    return new Promise((resolve, reject) => {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`);
      xhr.onload = () => {
        if (xhr.status === 200) resolve(JSON.parse(xhr.responseText).secure_url);
        else reject(new Error('Upload failed'));
      };
      xhr.onerror = reject;
      xhr.send(fd);
    });
  }

  // ---------- Save order ----------
  async function saveOrder() {
    if (!currentUser || radios.length === 0) return;
    const order = radios.map(r => r.id);
    await db.collection('users').doc(currentUser.uid).collection('settings').doc('preferences').set({ order }, { merge: true });
  }

  // ---------- Listen to radios ----------
  function listenToRadios() {
    if (unsubscribeRadios) unsubscribeRadios();
    if (!currentUser) return;
    unsubscribeRadios = db.collection('users').doc(currentUser.uid).collection('radios')
      .orderBy('createdAt', 'desc')
      .onSnapshot(async (snapshot) => {
        let savedOrder = [];
        const prefs = await db.collection('users').doc(currentUser.uid).collection('settings').doc('preferences').get();
        if (prefs.exists) savedOrder = prefs.data().order || [];
        radios = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          radios.push({ id: doc.id, ...data, favorite: data.favorite || false });
        });
        if (savedOrder.length) {
          radios.sort((a, b) => (savedOrder.indexOf(a.id) - savedOrder.indexOf(b.id)));
        }
        renderRadios();
        hideSplash();
      });
  }

  function renderRadios() {
    const grid = document.getElementById('radioGrid');
    let filtered = radios;
    if (currentFilter === 'favorites') filtered = radios.filter(r => r.favorite);
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-state">✨ لا توجد محطات، اضغط على + للإضافة</div>';
      return;
    }
    grid.innerHTML = filtered.map(radio => `
      <div class="radio-card ${editMode ? 'edit-mode' : ''}" data-id="${radio.id}" ${editMode ? 'draggable="true"' : ''}>
        ${editMode ? '<div class="drag-handle"><i class="fas fa-arrows-alt"></i></div>' : ''}
        <div class="menu-dots" onclick="event.stopPropagation(); openEditMenu('${radio.id}')"><i class="fas fa-ellipsis-v"></i></div>
        <img src="${radio.imageUrl || 'https://placehold.co/300x200/f1f5f9/1e293b?text=Radio'}" 
             onerror="this.src='https://placehold.co/300x200/f1f5f9/1e293b?text=Radio'" 
             ondblclick="event.stopPropagation(); toggleFavorite('${radio.id}')">
        <h3>${escapeHtml(radio.name)}</h3>
      </div>
    `).join('');
    // Single click to play
    document.querySelectorAll('.radio-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (!editMode && !e.target.closest('.menu-dots') && !e.target.closest('.drag-handle')) {
          playRadio(card.dataset.id);
        }
      });
    });
    if (editMode) enableDragDrop();
  }

  function enableDragDrop() {
    let dragSrc = null;
    document.querySelectorAll('.radio-card').forEach(card => {
      card.addEventListener('dragstart', e => {
        dragSrc = card;
        e.dataTransfer.effectAllowed = 'move';
        card.classList.add('dragging');
      });
      card.addEventListener('dragend', () => card.classList.remove('dragging'));
      card.addEventListener('dragover', e => e.preventDefault());
      card.addEventListener('drop', async e => {
        e.preventDefault();
        if (dragSrc && dragSrc !== card) {
          const fromId = dragSrc.dataset.id;
          const toId = card.dataset.id;
          const fromIdx = radios.findIndex(r => r.id == fromId);
          const toIdx = radios.findIndex(r => r.id == toId);
          if (fromIdx !== -1 && toIdx !== -1) {
            const [moved] = radios.splice(fromIdx, 1);
            radios.splice(toIdx, 0, moved);
            renderRadios();
            await saveOrder();
            showToast('✓ تم تحديث الترتيب');
          }
        }
        dragSrc = null;
      });
    });
  }

  // ---------- Toggle favorite ----------
  window.toggleFavorite = async function(id) {
    const station = radios.find(r => r.id == id);
    if (!station) return;
    const newFav = !station.favorite;
    await db.collection('users').doc(currentUser.uid).collection('radios').doc(id).update({ favorite: newFav });
    showToast(newFav ? '❤️ أضيفت للمفضلة' : '💔 أزيلت من المفضلة');
  };

  // ---------- Improved play with retry and URL encoding ----------
  function attemptPlay(url, retriesLeft = 3) {
    let cleanUrl;
    try {
      cleanUrl = encodeURI(url); // ترميز الأحرف الخاصة مثل ; : /؟ إلخ
    } catch(e) {
      cleanUrl = url;
    }
    audio.src = cleanUrl;
    audio.load();
    audio.play().then(() => {
      retryCount = 0;
      showToast('✓ جاري التشغيل');
    }).catch(error => {
      console.warn('Play error:', error);
      if (retriesLeft > 0 && retryCount < 3) {
        retryCount++;
        showToast(`⚠️ محاولة إعادة الاتصال (${retryCount}/3)...`);
        setTimeout(() => attemptPlay(url, retriesLeft - 1), 2000);
      } else {
        showToast('❌ فشل التشغيل، الرابط غير مدعوم أو أن الخادم لا يستجيب');
      }
    });
  }

  window.playRadio = function(id) {
    if (retryTimer) clearTimeout(retryTimer);
    retryCount = 0;
    const station = radios.find(r => r.id == id);
    if (!station) return;
    currentPlayingId = id;
    attemptPlay(station.streamUrl);
    // Update UI
    document.getElementById('miniPlayer').classList.remove('hidden');
    document.getElementById('playerMiniAvatar').src = station.imageUrl || 'https://placehold.co/50x50';
    document.getElementById('expandedAvatar').src = station.imageUrl || 'https://placehold.co/220x220';
    document.getElementById('expandedTitle').innerText = station.name;
    updateAllPlayerUI();
    showToast(`🎵 تشغيل ${station.name}`);
  };

  // ---------- Player UI sync (fixed for iOS) ----------
  function updateAllPlayerUI() {
    const isPlaying = !audio.paused;
    const playIcon = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
    const miniPlay = document.getElementById('miniPlayPauseBtn');
    const expPlay = document.getElementById('expandedPlayPauseBtn');
    if (miniPlay) miniPlay.innerHTML = playIcon;
    if (expPlay) expPlay.innerHTML = playIcon;

    const isMuted = audio.muted;
    let muteIcon = isMuted ? '<i class="fas fa-volume-mute"></i>' :
                    (audio.volume <= 0.5 ? '<i class="fas fa-volume-down"></i>' : '<i class="fas fa-volume-up"></i>');
    const miniMute = document.getElementById('miniMuteBtn');
    const expMute = document.getElementById('expandedMuteIcon');
    if (miniMute) miniMute.innerHTML = muteIcon;
    if (expMute) expMute.innerHTML = muteIcon;

    const volSlider = document.getElementById('expandedVolumeSlider');
    if (volSlider) volSlider.value = audio.volume;
  }

  // ---------- Playback controls ----------
  function togglePlayPause() {
    if (audio.paused) {
      const station = radios.find(r => r.id == currentPlayingId);
      if (station) attemptPlay(station.streamUrl);
      else audio.play();
    } else {
      audio.pause();
    }
    updateAllPlayerUI();
  }
  function previousTrack() {
    if (radios.length && currentPlayingId) {
      let idx = radios.findIndex(r => r.id == currentPlayingId);
      idx = (idx - 1 + radios.length) % radios.length;
      playRadio(radios[idx].id);
    }
  }
  function nextTrack() {
    if (radios.length && currentPlayingId) {
      let idx = radios.findIndex(r => r.id == currentPlayingId);
      idx = (idx + 1) % radios.length;
      playRadio(radios[idx].id);
    }
  }
  function toggleMute() {
    audio.muted = !audio.muted;
    updateAllPlayerUI();
  }
  function setVolume(value) {
    audio.volume = parseFloat(value);
    if (audio.muted && audio.volume > 0) audio.muted = false;
    updateAllPlayerUI();
    // For iOS: ensure volume change works even if paused
    if (audio.paused && audio.readyState >= 2) {
      audio.play().catch(() => {});
    }
  }

  // ---------- Delete / Edit ----------
  window.openEditMenu = async function(id) {
    document.getElementById('userDropdown').classList.add('hidden');
    const result = await Swal.fire({
      title: 'خيارات المحطة',
      showCancelButton: true,
      confirmButtonText: '✏️ تعديل',
      denyButtonText: '🗑️ حذف',
      showDenyButton: true
    });
    if (result.isConfirmed) editRadio(id);
    else if (result.isDenied) deleteRadio(id);
  };

  window.deleteRadio = async function(id) {
    const confirm = await Swal.fire({ title: 'حذف المحطة؟', icon: 'warning', showCancelButton: true });
    if (confirm.isConfirmed) {
      await db.collection('users').doc(currentUser.uid).collection('radios').doc(id).delete();
      if (currentPlayingId == id) {
        audio.pause();
        document.getElementById('miniPlayer').classList.add('hidden');
        document.getElementById('expandedPlayer').classList.add('hidden');
        currentPlayingId = null;
      }
      showToast('✓ تم الحذف');
    }
  };

  window.editRadio = async function(id) {
    const radio = radios.find(r => r.id == id);
    editId = id;
    document.getElementById('modalTitle').innerText = '✏️ تعديل المحطة';
    document.getElementById('radioName').value = radio.name;
    document.getElementById('radioUrl').value = radio.streamUrl;
    document.getElementById('radioCategory').value = radio.category || '';
    currentCloudinaryUrl = radio.imageUrl;
    currentImageFile = null;
    if (currentCloudinaryUrl) {
      document.getElementById('imagePreview').classList.remove('hidden');
      document.getElementById('previewImg').src = currentCloudinaryUrl;
    } else {
      document.getElementById('imagePreview').classList.add('hidden');
    }
    document.getElementById('deleteFromModalBtn').classList.remove('hidden');
    document.getElementById('radioModal').classList.remove('hidden');
  };

  // ---------- Auth UI ----------
  document.getElementById('registerBtn').onclick = async () => {
    const name = document.getElementById('registerName').value;
    const email = document.getElementById('registerEmail').value;
    const pwd = document.getElementById('registerPassword').value;
    const conf = document.getElementById('registerConfirmPassword').value;
    if (pwd !== conf) return showToast('⚠️ كلمة المرور غير متطابقة');
    try {
      const userCred = await auth.createUserWithEmailAndPassword(email, pwd);
      await userCred.user.updateProfile({ displayName: name });
      await userCred.user.sendEmailVerification();
      showToast('✓ تم التسجيل! راجع بريدك لتفعيل الحساب');
      await auth.signOut();
      document.getElementById('registerCard').classList.add('hidden');
      document.getElementById('loginCard').classList.remove('hidden');
    } catch (e) { showToast('⚠️ ' + e.message); }
  };
  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value;
    const pwd = document.getElementById('loginPassword').value;
    try {
      const userCred = await auth.signInWithEmailAndPassword(email, pwd);
      if (!userCred.user.emailVerified) {
        await auth.signOut();
        showToast('⚠️ يرجى تأكيد البريد الإلكتروني');
      }
    } catch (e) { showToast('⚠️ بيانات غير صحيحة'); }
  };
  document.getElementById('googleLoginBtn').onclick = async () => {
    try {
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    } catch (e) { showToast('⚠️ ' + e.message); }
  };
  document.getElementById('showRegister').onclick = () => {
    document.getElementById('loginCard').classList.add('hidden');
    document.getElementById('registerCard').classList.remove('hidden');
  };
  document.getElementById('showLogin').onclick = () => {
    document.getElementById('registerCard').classList.add('hidden');
    document.getElementById('loginCard').classList.remove('hidden');
  };
  document.getElementById('logoutBtn').onclick = async () => {
    await auth.signOut();
    audio.pause();
    document.getElementById('miniPlayer').classList.add('hidden');
    document.getElementById('expandedPlayer').classList.add('hidden');
    currentPlayingId = null;
    showToast('✓ تم تسجيل الخروج');
  };

  // ---------- Search ----------
  const searchBtn = document.getElementById('searchBtn');
  const searchContainer = document.getElementById('searchContainer');
  const searchInput = document.getElementById('searchInput');
  searchBtn.onclick = () => {
    searchContainer.classList.toggle('show');
    if (searchContainer.classList.contains('show')) searchInput.focus();
  };
  searchInput.oninput = (e) => {
    const val = e.target.value.toLowerCase();
    document.querySelectorAll('.radio-card').forEach(card => {
      const title = card.querySelector('h3')?.innerText.toLowerCase() || '';
      card.style.display = title.includes(val) ? '' : 'none';
    });
  };

  // ---------- Add / Edit radio modal ----------
  document.getElementById('addRadioBtn').onclick = () => {
    editId = null;
    document.getElementById('modalTitle').innerText = '➕ محطة جديدة';
    document.getElementById('radioName').value = '';
    document.getElementById('radioUrl').value = '';
    document.getElementById('radioCategory').value = '';
    currentCloudinaryUrl = null; currentImageFile = null;
    document.getElementById('imagePreview').classList.add('hidden');
    document.getElementById('deleteFromModalBtn').classList.add('hidden');
    document.getElementById('radioModal').classList.remove('hidden');
  };
  document.getElementById('saveRadioBtn').onclick = async () => {
    const name = document.getElementById('radioName').value.trim();
    const url = document.getElementById('radioUrl').value.trim();
    if (!name || !url) return showToast('⚠️ املأ الحقول');
    let img = currentCloudinaryUrl;
    if (currentImageFile) {
      document.getElementById('uploadProgress').classList.remove('hidden');
      try {
        img = await uploadToCloudinary(currentImageFile);
      } catch (e) {
        document.getElementById('uploadProgress').classList.add('hidden');
        showToast('⚠️ فشل رفع الصورة');
        return;
      }
      document.getElementById('uploadProgress').classList.add('hidden');
    }
    const data = {
      name,
      streamUrl: url,
      category: document.getElementById('radioCategory').value.trim() || 'عام',
      imageUrl: img,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    if (editId) {
      await db.collection('users').doc(currentUser.uid).collection('radios').doc(editId).update(data);
      showToast('✓ تم التعديل');
    } else {
      data.favorite = false;
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      await db.collection('users').doc(currentUser.uid).collection('radios').add(data);
      showToast('✓ تمت الإضافة');
    }
    document.getElementById('radioModal').classList.add('hidden');
  };
  document.getElementById('deleteFromModalBtn').onclick = async () => {
    if (editId) {
      await window.deleteRadio(editId);
      document.getElementById('radioModal').classList.add('hidden');
    }
  };
  document.getElementById('closeModalBtn').onclick = () => document.getElementById('radioModal').classList.add('hidden');

  const uploadArea = document.getElementById('imageUploadArea');
  const imgInput = document.getElementById('radioImage');
  uploadArea.onclick = () => imgInput.click();
  imgInput.onchange = (e) => {
    const file = e.target.files[0];
    if (file && file.type.startsWith('image/') && file.size <= 5 * 1024 * 1024) {
      currentImageFile = file;
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('imagePreview').classList.remove('hidden');
        document.getElementById('previewImg').src = ev.target.result;
      };
      reader.readAsDataURL(file);
    } else {
      showToast('⚠️ صورة فقط وحتى 5MB');
    }
  };

  // ---------- User dropdown ----------
  const profileTrigger = document.getElementById('profileTrigger');
  const userDropdown = document.getElementById('userDropdown');
  profileTrigger.onclick = (e) => {
    e.stopPropagation();
    userDropdown.classList.toggle('hidden');
  };
  document.addEventListener('click', (e) => {
    if (!profileTrigger.contains(e.target) && !userDropdown.contains(e.target)) {
      userDropdown.classList.add('hidden');
    }
  });
  async function updateDropdown() {
    if (!currentUser) return;
    document.getElementById('dropdownName').innerText = currentUser.displayName || 'مستخدم';
    document.getElementById('dropdownEmail').innerText = currentUser.email;
    const profileDoc = await db.collection('users').doc(currentUser.uid).collection('settings').doc('profile').get();
    if (profileDoc.exists && profileDoc.data().avatarUrl) {
      document.getElementById('dropdownAvatar').src = profileDoc.data().avatarUrl;
    }
  }
  document.querySelectorAll('.dropdown-item[data-nav]').forEach(item => {
    item.onclick = () => {
      currentFilter = item.dataset.nav;
      renderRadios();
      userDropdown.classList.add('hidden');
    };
  });
  document.getElementById('editModeDropdown').onclick = () => {
    editMode = !editMode;
    const btn = document.getElementById('editModeDropdown');
    btn.innerHTML = editMode ? '<i class="fas fa-check"></i> إنهاء الترتيب' : '<i class="fas fa-arrows-alt"></i> وضع الترتيب';
    renderRadios();
    userDropdown.classList.add('hidden');
    showToast(editMode ? 'اسحب القنوات لإعادة الترتيب' : 'تم الخروج من وضع الترتيب');
  };

  // ---------- View pills ----------
  document.querySelectorAll('.view-pill').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.view-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      const appDiv = document.getElementById('app');
      appDiv.classList.remove('vertical-view', 'circle-view');
      if (currentView === 'vertical') appDiv.classList.add('vertical-view');
      else if (currentView === 'circle') appDiv.classList.add('circle-view');
      renderRadios();
    };
  });

  // ---------- Theme toggle ----------
  document.getElementById('themeToggle').onclick = () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    document.getElementById('themeToggle').innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
  };
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  document.getElementById('themeToggle').innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';

  // ---------- Player control binding ----------
  document.getElementById('miniPlayPauseBtn').onclick = togglePlayPause;
  document.getElementById('miniPrevBtn').onclick = previousTrack;
  document.getElementById('miniNextBtn').onclick = nextTrack;
  document.getElementById('miniMuteBtn').onclick = toggleMute;
  document.getElementById('expandPlayerBtn').onclick = () => document.getElementById('expandedPlayer').classList.remove('hidden');
  document.getElementById('closeExpandedBtn').onclick = () => document.getElementById('expandedPlayer').classList.add('hidden');
  document.getElementById('expandedPlayPauseBtn').onclick = togglePlayPause;
  document.getElementById('expandedPrevBtn').onclick = previousTrack;
  document.getElementById('expandedNextBtn').onclick = nextTrack;
  document.getElementById('expandedMuteIcon').onclick = toggleMute;
  document.getElementById('expandedVolumeSlider').oninput = (e) => setVolume(e.target.value);

  audio.onplay = updateAllPlayerUI;
  audio.onpause = updateAllPlayerUI;
  audio.onvolumechange = updateAllPlayerUI;
  audio.onended = nextTrack;
  audio.onerror = () => {
    const station = radios.find(r => r.id == currentPlayingId);
    if (station) attemptPlay(station.streamUrl, 3);
  };

  // ---------- Auth state ----------
  auth.onAuthStateChanged(async (user) => {
    if (user && user.emailVerified) {
      currentUser = user;
      document.getElementById('authContainer').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      await updateDropdown();
      listenToRadios();
      hideSplash();
    } else if (user && !user.emailVerified) {
      await auth.signOut();
      document.getElementById('authContainer').classList.remove('hidden');
      document.getElementById('app').classList.add('hidden');
      hideSplash();
      showToast('⚠️ يرجى تأكيد البريد الإلكتروني');
    } else {
      currentUser = null;
      document.getElementById('app').classList.add('hidden');
      document.getElementById('authContainer').classList.remove('hidden');
      document.getElementById('miniPlayer').classList.add('hidden');
      document.getElementById('expandedPlayer').classList.add('hidden');
      if (audio) audio.pause();
      hideSplash();
    }
  });
  setTimeout(hideSplash, 3000);
</script>
</body>
</html>
