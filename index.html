<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎧 Cloud Radio | Supabase</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      min-height: 100vh;
    }

    .hidden { display: none !important; }

    /* Splash Screen */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #020617, #0f172a);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loader {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid rgba(34,197,94,0.1);
      border-top: 4px solid #22c55e;
      border-right: 4px solid #3b82f6;
      animation: spin 1s ease infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading-status {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
    }

    /* Glassmorphism */
    .glass-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
    }

    /* Auth Container */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 450px;
      padding: 40px;
    }

    .auth-card h2 {
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .auth-card input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
    }

    .auth-card input:focus {
      outline: none;
      border: 1px solid #22c55e;
    }

    .auth-card button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.2s;
    }

    .auth-card button:hover {
      transform: translateY(-2px);
    }

    .auth-card p {
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.7);
    }

    .auth-card span {
      color: #22c55e;
      cursor: pointer;
    }

    /* Main App */
    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      padding: 25px;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-y: auto;
    }

    .sidebar h1 {
      margin-bottom: 25px;
      font-size: 1.5rem;
    }

    .sidebar button {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .sidebar button:hover {
      transform: translateY(-2px);
    }

    #searchInput {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 12px;
      color: white;
      margin-bottom: 20px;
    }

    #searchInput:focus {
      outline: none;
      border: 1px solid #22c55e;
    }

    .menu-item {
      padding: 12px;
      margin-bottom: 5px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .menu-item:hover {
      background: rgba(255,255,255,0.1);
    }

    .menu-item.active {
      background: rgba(34,197,94,0.2);
      border-left: 3px solid #22c55e;
    }

    .logout-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626) !important;
    }

    .main-content {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
    }

    .topbar {
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .topbar h2 {
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sync-status {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(34,197,94,0.2);
      color: #22c55e;
    }

    .sync-status.offline {
      background: rgba(239,68,68,0.2);
      color: #ef4444;
    }

    .radio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .radio-card {
      padding: 15px;
      transition: transform 0.3s;
      cursor: pointer;
    }

    .radio-card:hover {
      transform: translateY(-5px);
    }

    .radio-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 12px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .card-actions button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s;
    }

    .card-actions button:hover {
      transform: translateY(-2px);
    }

    .play-btn { background: #22c55e; color: white; }
    .delete-btn { background: #ef4444; color: white; }
    .edit-btn { background: #3b82f6; color: white; }
    .favorite-btn { background: #f59e0b; color: white; }
    .favorite-btn.active { background: #ef4444; }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      width: 100%;
      max-width: 500px;
      padding: 30px;
    }

    .modal-content h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .modal-content input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 10px;
      color: white;
    }

    .modal-content button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    /* Mini Player */
    .mini-player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 1000;
    }

    .player-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .player-left img {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      object-fit: cover;
    }

    .player-controls {
      display: flex;
      gap: 15px;
    }

    .player-controls button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .player-controls button:hover {
      transform: scale(1.1);
    }

    .volume-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .volume-wrapper input {
      width: 100px;
      height: 4px;
      cursor: pointer;
    }

    .skeleton-card {
      height: 280px;
      border-radius: 20px;
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: rgba(255,255,255,0.5);
    }

    @media (max-width: 768px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: relative; }
      .mini-player { flex-direction: column; height: auto; gap: 10px; padding: 15px; }
      .player-controls { order: 2; }
      .volume-wrapper { order: 3; }
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="loader"></div>
    <div id="loading-status">Connecting to Supabase...</div>
  </div>

  <!-- Auth Container -->
  <div class="auth-container hidden" id="authContainer">
    <div class="glass-card auth-card" id="loginCard">
      <h2>🔐 Sign In</h2>
      <input type="email" id="loginEmail" placeholder="Email address">
      <input type="password" id="loginPassword" placeholder="Password">
      <button id="loginBtn">Sign In</button>
      <p>Don't have an account? <span id="showRegister">Create Account</span></p>
    </div>

    <div class="glass-card auth-card hidden" id="registerCard">
      <h2>📝 Create Account</h2>
      <input type="text" id="registerName" placeholder="Full name">
      <input type="email" id="registerEmail" placeholder="Email address">
      <input type="password" id="registerPassword" placeholder="Password">
      <input type="password" id="registerConfirmPassword" placeholder="Confirm password">
      <button id="registerBtn">Create Account</button>
      <p>Already have an account? <span id="showLogin">Sign In</span></p>
    </div>
  </div>

  <!-- Main App -->
  <div class="app hidden" id="app">
    <aside class="sidebar glass-card">
      <div>
        <h1>🎙️ CLOUD RADIO</h1>
        <button id="addRadioBtn">+ Add Station</button>
        <input type="text" id="searchInput" placeholder="Search...">
        <div class="menu">
          <div class="menu-item active" data-filter="all">🏠 All Stations</div>
          <div class="menu-item" data-filter="favorites">❤️ Favorites</div>
          <div class="menu-item" data-filter="recent">🕒 Recently Played</div>
        </div>
      </div>
      <button id="logoutBtn" class="logout-btn">🚪 Sign Out</button>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <h2 id="pageTitle">📻 All Radio Stations</h2>
        <div class="sync-status" id="syncStatus">
          <i class="fas fa-cloud-upload-alt"></i> Synced
        </div>
      </div>
      <div class="radio-grid" id="radioGrid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </main>
  </div>

  <!-- Add Station Modal -->
  <div class="modal hidden" id="radioModal">
    <div class="modal-content glass-card">
      <h2>➕ Add New Station</h2>
      <input type="text" id="radioName" placeholder="Station name">
      <input type="text" id="radioUrl" placeholder="Stream URL (mp3/m3u8)">
      <input type="text" id="radioCategory" placeholder="Category (e.g., Music, News)">
      <input type="file" id="radioImage" accept="image/*">
      <button id="saveRadioBtn">💾 Save Station</button>
      <button id="closeModalBtn">❌ Cancel</button>
    </div>
  </div>

  <!-- Mini Player -->
  <div class="mini-player hidden" id="miniPlayer">
    <div class="player-left">
      <img id="playerImage" src="">
      <div>
        <h4 id="playerTitle">No station selected</h4>
        <span>🎵 Live Radio</span>
      </div>
    </div>
    <div class="player-controls">
      <button id="prevBtn">⏮</button>
      <button id="playPauseBtn">▶</button>
      <button id="nextBtn">⏭</button>
    </div>
    <div class="volume-wrapper">
      🔊 <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
    </div>
  </div>

  <script>
    // ============================================
    // 🔑 IMPORTANT: Replace with your Supabase credentials
    // Get them from: Supabase Dashboard → Project Settings → API
    // ============================================
    const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';  // ← CHANGE THIS
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';                // ← CHANGE THIS
    
    if (SUPABASE_URL === 'https://YOUR_PROJECT.supabase.co') {
      console.error('❌ Please set your Supabase URL and Anon Key in the script!');
      document.getElementById('loading-status').innerHTML = '⚠️ Please configure Supabase credentials first!';
    }
    
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = null;
    let radios = [];
    let currentFilter = 'all';
    let currentPlayingId = null;
    let realtimeChannel = null;
    const audio = new Audio();
    audio.volume = 0.8;
    
    // Update loading status
    function updateLoadingStatus(message, isError = false) {
      const statusEl = document.getElementById('loading-status');
      if (statusEl) {
        statusEl.innerHTML = message;
        if (isError) {
          statusEl.style.color = '#ef4444';
        }
      }
    }
    
    // Hide splash screen after loading
    function hideSplash() {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 500);
        }
      }, 500);
    }
    
    function showToast(icon, title) {
      Swal.fire({
        toast: true,
        position: 'top-end',
        icon: icon,
        title: title,
        showConfirmButton: false,
        timer: 3000,
        background: '#1e293b',
        color: '#fff'
      });
    }
    
    function updateSyncStatus(online, message = 'Synced') {
      const statusEl = document.getElementById('syncStatus');
      if (statusEl) {
        statusEl.className = `sync-status ${online ? '' : 'offline'}`;
        statusEl.innerHTML = online ? `<i class="fas fa-cloud-upload-alt"></i> ${message}` : `<i class="fas fa-exclamation-triangle"></i> Offline`;
      }
    }
    
    // Setup Realtime Subscription
    function setupRealtimeSubscription() {
      if (realtimeChannel) {
        realtimeChannel.unsubscribe();
      }
      
      if (!currentUser) return;
      
      realtimeChannel = supabase
        .channel('radios-changes')
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'radios',
          filter: `createdBy=eq.${currentUser.id}`
        }, () => {
          console.log('🔄 Realtime update received');
          loadRadios();
        })
        .subscribe((status) => {
          console.log('📡 Realtime status:', status);
          updateSyncStatus(status === 'SUBSCRIBED', status === 'SUBSCRIBED' ? 'Live' : 'Connecting...');
        });
    }
    
    // Load radios from Supabase
    async function loadRadios() {
      if (!currentUser) return;
      
      try {
        const { data, error } = await supabase
          .from('radios')
          .select('*')
          .eq('createdBy', currentUser.id)
          .order('created_at', { ascending: false });
        
        if (error) throw error;
        
        radios = data || [];
        renderRadios();
        updateSyncStatus(true);
        
      } catch (error) {
        console.error('Error loading radios:', error);
        updateSyncStatus(false, error.message);
        showToast('error', 'Failed to load stations');
      }
    }
    
    function renderRadios() {
      const radioGrid = document.getElementById('radioGrid');
      let filteredRadios = [...radios];
      
      if (currentFilter === 'favorites') {
        filteredRadios = radios.filter(r => r.favorite === true);
      } else if (currentFilter === 'recent' && currentUser) {
        const recent = JSON.parse(localStorage.getItem(`recent_${currentUser.id}`) || '[]');
        filteredRadios = recent.map(id => radios.find(r => r.id == id)).filter(Boolean);
      }
      
      if (filteredRadios.length === 0) {
        radioGrid.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-radio" style="font-size: 48px; margin-bottom: 16px;"></i>
            <h3>No stations found</h3>
            <p>Click "Add Station" to add your first radio station</p>
          </div>
        `;
        return;
      }
      
      radioGrid.innerHTML = filteredRadios.map(radio => `
        <div class="radio-card glass-card">
          <img src="${radio.imageUrl || 'https://placehold.co/400x300/1e293b/22c55e?text=Radio'}" 
               onerror="this.src='https://placehold.co/400x300/1e293b/22c55e?text=Radio'">
          <h3>${escapeHtml(radio.name)}</h3>
          <p><i class="fas fa-tag"></i> ${escapeHtml(radio.category || 'General')}</p>
          <div class="card-actions">
            <button class="play-btn" onclick="playRadio(${radio.id})">
              <i class="fas fa-play"></i> Play
            </button>
            <button class="favorite-btn ${radio.favorite ? 'active' : ''}" onclick="toggleFavorite(${radio.id})">
              <i class="fas fa-heart"></i>
            </button>
            <button class="edit-btn" onclick="editRadio(${radio.id})">
              <i class="fas fa-edit"></i>
            </button>
            <button class="delete-btn" onclick="deleteRadio(${radio.id})">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
      `).join('');
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Upload image to Supabase Storage
    async function uploadImage(file) {
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}.${fileExt}`;
      const filePath = `public/${fileName}`;
      
      const { error } = await supabase.storage
        .from('radio-images')
        .upload(filePath, file);
      
      if (error) throw error;
      
      const { data: { publicUrl } } = supabase.storage
        .from('radio-images')
        .getPublicUrl(filePath);
      
      return publicUrl;
    }
    
    // CRUD Operations
    window.playRadio = function(id) {
      const station = radios.find(r => r.id == id);
      if (!station) return;
      
      currentPlayingId = id;
      audio.src = station.streamUrl;
      audio.play().catch(() => showToast('error', 'Cannot play this stream'));
      
      document.getElementById('miniPlayer').classList.remove('hidden');
      document.getElementById('playerTitle').innerText = station.name;
      document.getElementById('playerImage').src = station.imageUrl || 'https://placehold.co/400x300/1e293b/22c55e?text=Radio';
      document.getElementById('playPauseBtn').innerHTML = '⏸';
      
      if (currentUser) {
        let recent = JSON.parse(localStorage.getItem(`recent_${currentUser.id}`) || '[]');
        recent = [id, ...recent.filter(i => i != id)].slice(0, 10);
        localStorage.setItem(`recent_${currentUser.id}`, JSON.stringify(recent));
        if (currentFilter === 'recent') renderRadios();
      }
      
      showToast('success', `Playing ${station.name}`);
    };
    
    window.toggleFavorite = async function(id) {
      const station = radios.find(r => r.id == id);
      if (!station) return;
      
      const { error } = await supabase
        .from('radios')
        .update({ favorite: !station.favorite })
        .eq('id', id);
      
      if (error) {
        showToast('error', 'Failed to update favorite');
      } else {
        showToast('success', station.favorite ? 'Removed from favorites' : 'Added to favorites');
      }
    };
    
    window.deleteRadio = async function(id) {
      const result = await Swal.fire({
        title: 'Delete station?',
        text: 'This action cannot be undone!',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#22c55e',
        confirmButtonText: 'Yes, delete',
        cancelButtonText: 'Cancel'
      });
      
      if (result.isConfirmed) {
        const { error } = await supabase
          .from('radios')
          .delete()
          .eq('id', id);
        
        if (error) {
          showToast('error', 'Failed to delete');
        } else {
          showToast('success', 'Station deleted');
        }
      }
    };
    
    window.editRadio = async function(id) {
      const station = radios.find(r => r.id == id);
      
      const { value: values } = await Swal.fire({
        title: 'Edit Station',
        html: `
          <input id="edit-name" class="swal2-input" placeholder="Station name" value="${station.name}">
          <input id="edit-url" class="swal2-input" placeholder="Stream URL" value="${station.streamUrl}">
          <input id="edit-cat" class="swal2-input" placeholder="Category" value="${station.category || ''}">
        `,
        focusConfirm: false,
        preConfirm: () => ({
          name: document.getElementById('edit-name').value,
          url: document.getElementById('edit-url').value,
          category: document.getElementById('edit-cat').value
        })
      });
      
      if (values && values.name && values.url) {
        const { error } = await supabase
          .from('radios')
          .update({
            name: values.name,
            streamUrl: values.url,
            category: values.category || 'General'
          })
          .eq('id', id);
        
        if (error) {
          showToast('error', 'Failed to update');
        } else {
          showToast('success', 'Station updated');
        }
      }
    };
    
    // Authentication
    document.getElementById('registerBtn').onclick = async () => {
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirmPassword').value;
      const name = document.getElementById('registerName').value;
      
      if (!email || !password) {
        return showToast('error', 'Please fill all fields');
      }
      if (password !== confirm) {
        return showToast('error', 'Passwords do not match');
      }
      if (password.length < 6) {
        return showToast('error', 'Password must be at least 6 characters');
      }
      
      updateLoadingStatus('Creating account...');
      
      const { error } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { name } }
      });
      
      if (error) {
        updateLoadingStatus('Error: ' + error.message, true);
        showToast('error', error.message);
      } else {
        updateLoadingStatus('Verification email sent! Check your inbox.');
