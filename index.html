<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>راديو سحابي | Cloudinary + Firebase</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a, #020617); color: white; min-height: 100vh; }
    .hidden { display: none !important; }
    
    #splash-screen {
      position: fixed; inset: 0; background: linear-gradient(135deg, #020617, #0f172a);
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
    }
    .loader {
      width: 80px; height: 80px; border-radius: 50%;
      border: 4px solid rgba(34,197,94,0.1);
      border-top: 4px solid #22c55e;
      border-right: 4px solid #3b82f6;
      animation: spin 1s ease infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-status { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 10px; }
    
    .glass-card {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
    }
    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { width: 100%; max-width: 450px; padding: 40px; }
    .auth-card h2 { text-align: center; margin-bottom: 30px; background: linear-gradient(135deg, #22c55e, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .auth-card input { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; color: white; font-size: 16px; }
    .auth-card input:focus { outline: none; border: 1px solid #22c55e; }
    .auth-card button { width: 100%; padding: 14px; background: linear-gradient(135deg, #22c55e, #16a34a); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: transform 0.2s; margin-bottom: 10px; }
    .auth-card button:hover { transform: translateY(-2px); }
    .auth-card p { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.7); }
    .auth-card span { color: #22c55e; cursor: pointer; }
    .google-btn { background: linear-gradient(135deg, #ea4335, #c5221f) !important; }
    
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 280px; padding: 25px; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; overflow-y: auto; }
    .sidebar h1 { margin-bottom: 25px; font-size: 1.5rem; }
    .sidebar button { width: 100%; padding: 12px; margin-bottom: 15px; background: linear-gradient(135deg, #22c55e, #16a34a); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
    .sidebar button:hover { transform: translateY(-2px); }
    #searchInput { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; color: white; margin-bottom: 20px; }
    #searchInput:focus { outline: none; border: 1px solid #22c55e; }
    .menu-item { padding: 12px; margin-bottom: 5px; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
    .menu-item:hover { background: rgba(255,255,255,0.1); }
    .menu-item.active { background: rgba(34,197,94,0.2); border-left: 3px solid #22c55e; }
    .logout-btn { background: linear-gradient(135deg, #ef4444, #dc2626) !important; }
    .main-content { flex: 1; padding: 25px; overflow-y: auto; }
    .topbar { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .topbar h2 { background: linear-gradient(135deg, #22c55e, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .radio-card { padding: 15px; transition: transform 0.3s; cursor: pointer; }
    .radio-card:hover { transform: translateY(-5px); }
    .radio-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 16px; margin-bottom: 12px; background: #1e293b; }
    .card-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .card-actions button { flex: 1; padding: 8px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: transform 0.2s; }
    .card-actions button:hover { transform: translateY(-2px); }
    .play-btn { background: #22c55e; color: white; }
    .delete-btn { background: #ef4444; color: white; }
    .edit-btn { background: #3b82f6; color: white; }
    .favorite-btn { background: #f59e0b; color: white; }
    .favorite-btn.active { background: #ef4444; }
    
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { width: 100%; max-width: 500px; padding: 30px; }
    .modal-content h2 { text-align: center; margin-bottom: 20px; }
    .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: rgba(255,255,255,0.1); border: none; border-radius: 10px; color: white; }
    .modal-content button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    
    .mini-player { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(15,23,42,0.95); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
    .player-left { display: flex; align-items: center; gap: 12px; }
    .player-left img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
    .player-controls { display: flex; gap: 15px; }
    .player-controls button { width: 40px; height: 40px; border-radius: 50%; border: none; background: #22c55e; color: white; cursor: pointer; transition: transform 0.2s; }
    .player-controls button:hover { transform: scale(1.1); }
    .volume-wrapper { display: flex; align-items: center; gap: 10px; }
    .volume-wrapper input { width: 100px; height: 4px; cursor: pointer; }
    
    .skeleton-card { height: 280px; border-radius: 20px; background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .empty-state { text-align: center; padding: 80px 20px; color: rgba(255,255,255,0.5); }
    
    @media (max-width: 768px) { .app { flex-direction: column; } .sidebar { width: 100%; height: auto; position: relative; } .mini-player { flex-direction: column; height: auto; gap: 10px; padding: 15px; } }
    .upload-preview { margin: 10px 0; text-align: center; }
    .upload-preview img { max-width: 80px; border-radius: 12px; }
    .cloudinary-upload-btn { background: linear-gradient(135deg, #3448C5, #1E2A6E) !important; color: white !important; margin-top: 10px; }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="loader"></div>
    <div id="loading-status">جاري تحميل الراديو السحابي...</div>
  </div>

  <div class="auth-container hidden" id="authContainer">
    <div class="glass-card auth-card" id="loginCard">
      <h2>🔐 تسجيل الدخول</h2>
      <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
      <input type="password" id="loginPassword" placeholder="كلمة المرور">
      <button id="loginBtn">تسجيل الدخول</button>
      <button id="googleLoginBtn" class="google-btn"><i class="fab fa-google"></i> تسجيل الدخول عبر Google</button>
      <p>ليس لديك حساب؟ <span id="showRegister">إنشاء حساب</span></p>
    </div>
    <div class="glass-card auth-card hidden" id="registerCard">
      <h2>📝 إنشاء حساب</h2>
      <input type="text" id="registerName" placeholder="الاسم">
      <input type="email" id="registerEmail" placeholder="البريد الإلكتروني">
      <input type="password" id="registerPassword" placeholder="كلمة المرور">
      <input type="password" id="registerConfirmPassword" placeholder="تأكيد كلمة المرور">
      <button id="registerBtn">إنشاء حساب</button>
      <p>لديك حساب؟ <span id="showLogin">تسجيل الدخول</span></p>
    </div>
  </div>

  <div class="app hidden" id="app">
    <aside class="sidebar glass-card">
      <div>
        <h1>📻 راديو نجوم</h1>
        <button id="addRadioBtn">+ إضافة محطة</button>
        <input type="text" id="searchInput" placeholder="بحث عن محطة...">
        <div class="menu">
          <div class="menu-item active" data-filter="all">🏠 الرئيسية</div>
          <div class="menu-item" data-filter="favorites">❤️ المفضلة</div>
          <div class="menu-item" data-filter="recent">🕒 آخر تشغيل</div>
        </div>
      </div>
      <button id="logoutBtn" class="logout-btn">🚪 تسجيل الخروج</button>
    </aside>
    <main class="main-content">
      <div class="topbar">
        <h2 id="pageTitle">📻 جميع المحطات</h2>
      </div>
      <div class="radio-grid" id="radioGrid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </main>
  </div>

  <!-- modal اضافة المحطات مع Cloudinary -->
  <div class="modal hidden" id="radioModal">
    <div class="modal-content glass-card">
      <h2>➕ محطة راديو جديدة</h2>
      <input type="text" id="radioName" placeholder="اسم المحطة *">
      <input type="text" id="radioUrl" placeholder="رابط البث المباشر * (مثل .mp3, .m3u8)">
      <input type="text" id="radioCategory" placeholder="التصنيف (موسيقى, اخبار, رياضة)">
      
      <!-- Cloudinary Upload Widget -->
      <button id="uploadCloudinaryBtn" class="cloudinary-upload-btn"><i class="fab fa-cloudinary"></i> رفع صورة من Cloudinary</button>
      <div id="imagePreview" class="upload-preview hidden">
        <img id="previewImg" src="">
        <p style="font-size:12px; margin-top:5px;">الصورة المرفوعة</p>
      </div>
      <input type="hidden" id="cloudinaryImageUrl">
      
      <button id="saveRadioBtn">💾 حفظ المحطة</button>
      <button id="closeModalBtn">❌ إلغاء</button>
    </div>
  </div>

  <div class="mini-player hidden" id="miniPlayer">
    <div class="player-left">
      <img id="playerImage" src="">
      <div>
        <h4 id="playerTitle">لا توجد محطة</h4>
        <span>🎵 مباشر</span>
      </div>
    </div>
    <div class="player-controls">
      <button id="prevBtn">⏮</button>
      <button id="playPauseBtn">▶</button>
      <button id="nextBtn">⏭</button>
    </div>
    <div class="volume-wrapper">
      🔊 <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
    </div>
  </div>

  <script>
    // 🔑 تكوين Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBRvU198Ov7i6XdQTiKkuPJ-8biyKQt0Eo",
      authDomain: "radioapp-4f31a.firebaseapp.com",
      projectId: "radioapp-4f31a",
      storageBucket: "radioapp-4f31a.firebasestorage.app",
      messagingSenderId: "109582001862",
      appId: "1:109582001862:web:0f88fc50166c6d3d3019c7"
    };

    // 🔑 تكوين Cloudinary - استبدل هذه البيانات ببيانات حسابك من cloudinary.com
    // سجل مجاناً على https://cloudinary.com وأضف بياناتك هنا
    const CLOUDINARY_CLOUD_NAME = "dzshfcvkg"; // استبدل باسم السحابة الخاص بك
    const CLOUDINARY_UPLOAD_PRESET = "radio_preset"; // ستحتاج لإنشاء upload preset في لوحة التحكم
    
    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // المتغيرات العامة
    let currentUser = null;
    let radios = [];
    let currentFilter = 'all';
    let currentPlayingId = null;
    let audio = new Audio();
    audio.volume = 0.8;
    let unsubscribeRadios = null;
    let currentCloudinaryUrl = null;

    function updateLoadingStatus(msg, isError = false) {
      const el = document.getElementById('loading-status');
      if(el) { el.innerHTML = msg; el.style.color = isError ? '#ef4444' : 'rgba(255,255,255,0.7)'; }
    }
    
    function hideSplash() {
      const splash = document.getElementById('splash-screen');
      if(splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 500); }
    }
    
    function showToast(icon, title) {
      Swal.fire({ toast: true, position: 'top-end', icon, title, showConfirmButton: false, timer: 3000, background: '#1e293b', color: '#fff' });
    }
    
    function escapeHtml(str) {
      if(!str) return '';
      return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; });
    }

    // تهيئة Cloudinary Upload Widget
    function initCloudinaryWidget() {
      if (!CLOUDINARY_CLOUD_NAME || CLOUDINARY_CLOUD_NAME === "YOUR_CLOUD_NAME") {
        console.warn("⚠️ يرجى إدخال بيانات Cloudinary الصحيحة في الكود");
        document.getElementById('uploadCloudinaryBtn').style.opacity = '0.5';
        document.getElementById('uploadCloudinaryBtn').title = 'يرجى إعداد Cloudinary أولاً';
        return;
      }
      
      const uploadButton = document.getElementById('uploadCloudinaryBtn');
      uploadButton.onclick = () => {
        cloudinary.openUploadWidget({
          cloudName: CLOUDINARY_CLOUD_NAME,
          uploadPreset: CLOUDINARY_UPLOAD_PRESET,
          sources: ['local', 'url', 'camera'],
          cropping: true,
          multiple: false,
          maxFileSize: 5000000, // 5MB
          clientAllowedFormats: ['image/*'],
          showAdvancedOptions: false,
          styles: {
            palette: {
              window: "#0f172a",
              windowBorder: "#22c55e",
              tabIcon: "#22c55e",
              menuIcons: "#22c55e",
              textDark: "#ffffff",
              textLight: "#ffffff",
              link: "#22c55e",
              action: "#22c55e",
              inactiveTabIcon: "#64748b",
              error: "#ef4444",
              inProgress: "#3b82f6",
              complete: "#22c55e"
            }
          }
        }, (error, result) => {
          if (error) {
            console.error("خطأ في الرفع:", error);
            showToast('error', 'فشل رفع الصورة');
          } else if (result && result.event === "success") {
            const imageUrl = result.info.secure_url;
            currentCloudinaryUrl = imageUrl;
            document.getElementById('cloudinaryImageUrl').value = imageUrl;
            document.getElementById('imagePreview').classList.remove('hidden');
            document.getElementById('previewImg').src = imageUrl;
            showToast('success', 'تم رفع الصورة بنجاح');
          }
        });
      };
    }

    // الاستماع للمحطات من Firestore
    function listenToRadios() {
      if(unsubscribeRadios) unsubscribeRadios();
      if(!currentUser) return;
      
      unsubscribeRadios = db.collection('radios').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
        radios = [];
        snapshot.forEach(docSnap => {
          let data = docSnap.data();
          radios.push({ id: docSnap.id, ...data, favorite: data.favorite || false });
        });
        renderRadios();
        updateLoadingStatus('جاهز', false);
        hideSplash();
      }, (error) => {
        console.error(error);
        showToast('error', 'خطأ في تحميل المحطات');
        updateLoadingStatus('خطأ في الاتصال', true);
      });
    }

    function renderRadios() {
      const grid = document.getElementById('radioGrid');
      let filtered = [...radios];
      if(currentFilter === 'favorites') filtered = radios.filter(r => r.favorite === true);
      else if(currentFilter === 'recent' && currentUser) {
        const recentIds = JSON.parse(localStorage.getItem(`recent_${currentUser.uid}`) || '[]');
        filtered = recentIds.map(id => radios.find(r => r.id == id)).filter(Boolean);
      }
      if(filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-radio" style="font-size:48px"></i><h3>لا توجد محطات</h3><p>أضف محطتك الأولى الآن</p><p style="font-size:12px; margin-top:10px;">يمكنك إضافة صورة عبر Cloudinary</p></div>';
        return;
      }
      grid.innerHTML = filtered.map(radio => `
        <div class="radio-card glass-card" data-id="${radio.id}">
          <img src="${radio.imageUrl || 'https://placehold.co/400x300/1e293b/22c55e?text=Radio'}" onerror="this.src='https://placehold.co/400x300/1e293b/22c55e?text=Radio'">
          <h3>${escapeHtml(radio.name)}</h3>
          <p>${escapeHtml(radio.category || 'عام')}</p>
          <div class="card-actions">
            <button class="play-btn" onclick="window.playRadio('${radio.id}')">▶ تشغيل</button>
            <button class="favorite-btn ${radio.favorite ? 'active' : ''}" onclick="window.toggleFavorite('${radio.id}')">❤️</button>
            <button class="edit-btn" onclick="window.editRadio('${radio.id}')">✏️</button>
            <button class="delete-btn" onclick="window.deleteRadio('${radio.id}')">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    // تشغيل المحطة
    window.playRadio = function(id) {
      const station = radios.find(r => r.id == id);
      if(!station) return;
      currentPlayingId = id;
      audio.src = station.streamUrl;
      audio.play().catch(e => { showToast('error', 'لا يمكن تشغيل البث، تأكد من الرابط'); });
      document.getElementById('miniPlayer').classList.remove('hidden');
      document.getElementById('playerTitle').innerText = station.name;
      document.getElementById('playerImage').src = station.imageUrl || 'https://placehold.co/400x300/1e293b/22c55e?text=Radio';
      document.getElementById('playPauseBtn').innerHTML = '⏸';
      if(currentUser) {
        let recent = JSON.parse(localStorage.getItem(`recent_${currentUser.uid}`) || '[]');
        recent = [id, ...recent.filter(i => i != id)].slice(0, 10);
        localStorage.setItem(`recent_${currentUser.uid}`, JSON.stringify(recent));
        if(currentFilter === 'recent') renderRadios();
      }
      showToast('success', `تشغيل ${station.name}`);
    };

    window.toggleFavorite = async function(id) {
      const station = radios.find(r => r.id == id);
      if(!station) return;
      const newFav = !station.favorite;
      await db.collection('radios').doc(id).update({ favorite: newFav });
      showToast('success', newFav ? 'أضيفت إلى المفضلة' : 'أزيلت من المفضلة');
    };

    window.deleteRadio = async function(id) {
      const result = await Swal.fire({ title: 'حذف المحطة؟', text: 'لا يمكن التراجع', icon: 'warning', showCancelButton: true, confirmButtonText: 'نعم', cancelButtonText: 'إلغاء' });
      if(result.isConfirmed) {
        await db.collection('radios').doc(id).delete();
        showToast('success', 'تم الحذف');
        if(currentPlayingId == id) { audio.pause(); audio.src = ''; document.getElementById('miniPlayer').classList.add('hidden'); }
      }
    };

    window.editRadio = async function(id) {
      const radio = radios.find(r => r.id == id);
      const { value: formValues } = await Swal.fire({
        title: 'تعديل المحطة',
        html: `<input id="edit-name" class="swal2-input" placeholder="الاسم" value="${radio.name.replace(/"/g, '&quot;')}">
               <input id="edit-url" class="swal2-input" placeholder="رابط البث" value="${radio.streamUrl.replace(/"/g, '&quot;')}">
               <input id="edit-cat" class="swal2-input" placeholder="التصنيف" value="${(radio.category || '').replace(/"/g, '&quot;')}">`,
        preConfirm: () => ({ name: document.getElementById('edit-name').value, url: document.getElementById('edit-url').value, category: document.getElementById('edit-cat').value })
      });
      if(formValues) {
        await db.collection('radios').doc(id).update({ 
          name: formValues.name, 
          streamUrl: formValues.url, 
          category: formValues.category 
        });
        showToast('success', 'تم التحديث');
      }
    };

    // وظائف المصادقة
    document.getElementById('registerBtn').onclick = async () => {
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirmPassword').value;
      if(password !== confirm) return showToast('error', 'كلمتا المرور غير متطابقتين');
      try {
        const userCred = await auth.createUserWithEmailAndPassword(email, password);
        if(userCred.user) {
          await userCred.user.updateProfile({ displayName: name });
          showToast('success', 'تم التسجيل بنجاح');
          document.getElementById('registerCard').classList.add('hidden');
          document.getElementById('loginCard').classList.remove('hidden');
        }
      } catch(err) { showToast('error', err.message); }
    };
    
    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch(err) { showToast('error', 'البريد أو كلمة المرور خاطئة'); }
    };
    
    document.getElementById('googleLoginBtn').onclick = async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch(err) { showToast('error', err.message); }
    };
    
    document.getElementById('showRegister').onclick = () => {
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('registerCard').classList.remove('hidden');
    };
    
    document.getElementById('showLogin').onclick = () => {
      document.getElementById('registerCard').classList.add('hidden');
      document.getElementById('loginCard').classList.remove('hidden');
    };
    
    document.getElementById('logoutBtn').onclick = async () => {
      await auth.signOut();
      audio.pause(); audio.src = '';
      document.getElementById('miniPlayer').classList.add('hidden');
    };

    // حفظ المحطة مع رابط الصورة من Cloudinary
    document.getElementById('saveRadioBtn').onclick = async () => {
      const name = document.getElementById('radioName').value.trim();
      const streamUrl = document.getElementById('radioUrl').value.trim();
      if(!name || !streamUrl) return showToast('warning', 'الاسم ورابط البث مطلوبة');
      
      const imageUrl = currentCloudinaryUrl || null;
      
      await db.collection('radios').add({
        name, 
        streamUrl, 
        category: document.getElementById('radioCategory').value.trim() || 'عام',
        imageUrl: imageUrl, 
        favorite: false, 
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      
      showToast('success', 'تمت إضافة المحطة');
      document.getElementById('radioModal').classList.add('hidden');
      document.getElementById('radioName').value = ''; 
      document.getElementById('radioUrl').value = '';
      document.getElementById('radioCategory').value = ''; 
      document.getElementById('cloudinaryImageUrl').value = '';
      currentCloudinaryUrl = null;
      document.getElementById('imagePreview').classList.add('hidden');
    };
    
    document.getElementById('addRadioBtn').onclick = () => {
      currentCloudinaryUrl = null;
      document.getElementById('imagePreview').classList.add('hidden');
      document.getElementById('radioModal').classList.remove('hidden');
    };
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('radioModal').classList.add('hidden');

    // تحكمات المشغل
    document.getElementById('playPauseBtn').onclick = () => {
      if(audio.paused) { audio.play(); document.getElementById('playPauseBtn').innerHTML = '⏸'; }
      else { audio.pause(); document.getElementById('playPauseBtn').innerHTML = '▶'; }
    };
    
    document.getElementById('prevBtn').onclick = () => {
      if(radios.length && currentPlayingId) {
        let idx = radios.findIndex(r => r.id == currentPlayingId);
        idx = (idx - 1 + radios.length) % radios.length;
        window.playRadio(radios[idx].id);
      }
    };
    
    document.getElementById('nextBtn').onclick = () => {
      if(radios.length && currentPlayingId) {
        let idx = radios.findIndex(r => r.id == currentPlayingId);
        idx = (idx + 1) % radios.length;
        window.playRadio(radios[idx].id);
      }
    };
    
    document.getElementById('volumeSlider').oninput = (e) => audio.volume = e.target.value;
    
    document.getElementById('searchInput').oninput = (e) => {
      const val = e.target.value.toLowerCase();
      document.querySelectorAll('.radio-card').forEach(card => {
        const title = card.querySelector('h3')?.innerText.toLowerCase() || '';
        card.style.display = title.includes(val) ? 'flex' : 'none';
      });
    };
    
    document.querySelectorAll('.menu-item').forEach(item => {
      item.onclick = () => {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentFilter = item.dataset.filter;
        renderRadios();
        const titles = { all: '📻 جميع المحطات', favorites: '❤️ المفضلة', recent: '🕒 آخر تشغيل' };
        document.getElementById('pageTitle').innerText = titles[currentFilter];
      };
    });

    // مراقبة حالة المصادقة
    auth.onAuthStateChanged((user) => {
      if(user) {
        currentUser = user;
        document.getElementById('authContainer').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        if(unsubscribeRadios) unsubscribeRadios();
        listenToRadios();
        showToast('success', `مرحباً ${user.email || 'مستخدم'}`);
        hideSplash();
      } else {
        if(unsubscribeRadios) unsubscribeRadios();
        currentUser = null; radios = [];
        document.getElementById('app').classList.add('hidden');
        document.getElementById('authContainer').classList.remove('hidden');
        document.getElementById('miniPlayer').classList.add('hidden');
        audio.pause(); audio.src = '';
        hideSplash();
      }
    });
    
    // تهيئة Cloudinary Widget
    initCloudinaryWidget();
    
    setTimeout(() => {
      if(!currentUser && !document.getElementById('authContainer').classList.contains('hidden')) {
        hideSplash();
      }
    }, 3000);
  </script>
</body>
</html>
