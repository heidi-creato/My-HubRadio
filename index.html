<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Professional Radio Streaming App - Listen to live radio stations online" />
  <meta name="theme-color" content="#020617" />
  <title>🎧 Radio Streaming App | Live Radio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .hidden {
      display: none !important;
    }

    /* Splash Screen */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #020617, #0f172a);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loader-wrapper {
      text-align: center;
      animation: fadeInUp 0.8s ease;
    }

    .loader {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid rgba(34, 197, 94, 0.1);
      border-top: 4px solid #22c55e;
      border-right: 4px solid #3b82f6;
      animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      margin: auto;
    }

    .loader-wrapper h1 {
      margin-top: 30px;
      font-size: 2rem;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Glassmorphism */
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    /* Auth Container */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .auth-card {
      width: 100%;
      max-width: 450px;
      border-radius: 32px;
      padding: 50px 40px;
      animation: fadeInUp 0.6s ease;
      transition: transform 0.3s ease;
    }

    .auth-card:hover {
      transform: translateY(-5px);
    }

    .auth-card h2 {
      margin-bottom: 30px;
      text-align: center;
      font-size: 2rem;
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .auth-card input {
      width: 100%;
      padding: 16px 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      outline: none;
      border-radius: 16px;
      margin-bottom: 18px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .auth-card input:focus {
      border-color: #22c55e;
      background: rgba(255, 255, 255, 0.12);
    }

    .auth-card button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      transition: all 0.3s ease;
    }

    .auth-card button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
    }

    .google-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626) !important;
      margin-top: 10px;
    }

    .auth-card p {
      margin-top: 20px;
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
    }

    .auth-card span {
      color: #22c55e;
      cursor: pointer;
      font-weight: bold;
      margin-right: 5px;
    }

    /* App Layout */
    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 300px;
      padding: 30px 25px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar h1 {
      margin-bottom: 30px;
      font-size: 1.8rem;
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sidebar button {
      border: none;
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .sidebar button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
    }

    #searchInput {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    .menu {
      margin-top: 20px;
    }

    .menu-item {
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(-5px);
    }

    .menu-item.active {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(59, 130, 246, 0.2));
      color: white;
      border-left: 3px solid #22c55e;
    }

    .logout-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626) !important;
    }

    .main-content {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .topbar {
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .topbar h2 {
      font-size: 2rem;
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Radio Grid */
    .radio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }

    .radio-card {
      padding: 20px;
      border-radius: 24px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeIn 0.5s ease;
      cursor: pointer;
    }

    .radio-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .radio-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 15px;
      transition: transform 0.3s ease;
    }

    .radio-card:hover img {
      transform: scale(1.02);
    }

    .radio-card h3 {
      margin-bottom: 8px;
      font-size: 1.2rem;
    }

    .radio-card p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.85rem;
      margin-bottom: 15px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-actions button {
      flex: 1;
      border: none;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .play-btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .delete-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    .edit-btn {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
    }

    .favorite-btn {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
    }

    .favorite-btn.active {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    .card-actions button:hover {
      transform: translateY(-2px);
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    .modal-content {
      width: 100%;
      max-width: 550px;
      padding: 40px;
      border-radius: 32px;
    }

    .modal-content h2 {
      margin-bottom: 25px;
      text-align: center;
    }

    .modal-content input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      margin-bottom: 15px;
    }

    .modal-content input[type="file"] {
      padding: 10px;
    }

    .modal-content button {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    #saveRadioBtn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    #closeModalBtn {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    /* Mini Player */
    .mini-player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 90px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 1000;
      animation: fadeInUp 0.5s ease;
    }

    .player-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .player-left img {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      object-fit: cover;
    }

    .player-left h4 {
      font-size: 1rem;
      margin-bottom: 5px;
    }

    .player-left span {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .player-controls button {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 18px;
      transition: all 0.3s ease;
    }

    .player-controls button:hover {
      transform: scale(1.1);
    }

    .volume-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .volume-wrapper input {
      width: 100px;
      height: 4px;
      border-radius: 5px;
      cursor: pointer;
    }

    /* Skeleton Loading */
    .skeleton-card {
      height: 330px;
      border-radius: 24px;
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 10px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: rgba(255, 255, 255, 0.5);
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 992px) {
      .app {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
      }

      .mini-player {
        flex-direction: column;
        height: auto;
        padding: 15px;
        gap: 15px;
      }

      .player-controls {
        order: 2;
      }

      .volume-wrapper {
        order: 3;
      }
    }

    @media (max-width: 576px) {
      .auth-card, .modal-content {
        padding: 30px 20px;
      }

      .radio-grid {
        grid-template-columns: 1fr;
      }

      .topbar h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="loader-wrapper">
      <div class="loader"></div>
      <h1>🎧 RADIO LIVE</h1>
    </div>
  </div>

  <!-- Auth Container -->
  <div class="auth-container" id="authContainer">
    <div class="glass-card auth-card" id="loginCard">
      <h2><i class="fas fa-headphones"></i> تسجيل الدخول</h2>
      <input type="email" id="loginEmail" placeholder="📧 البريد الإلكتروني">
      <input type="password" id="loginPassword" placeholder="🔒 كلمة المرور">
      <button id="loginBtn"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</button>
      <button class="google-btn" id="googleLoginBtn">
        <i class="fab fa-google"></i> تسجيل الدخول عبر Google
      </button>
      <p>ليس لديك حساب؟ <span id="showRegister">إنشاء حساب</span></p>
      <p><span id="forgotPasswordBtn" style="color:#f59e0b;">نسيت كلمة المرور؟</span></p>
    </div>

    <div class="glass-card auth-card hidden" id="registerCard">
      <h2><i class="fas fa-user-plus"></i> إنشاء حساب</h2>
      <input type="text" id="registerName" placeholder="👤 الاسم الكامل">
      <input type="email" id="registerEmail" placeholder="📧 البريد الإلكتروني">
      <input type="password" id="registerPassword" placeholder="🔒 كلمة المرور">
      <input type="password" id="registerConfirmPassword" placeholder="✅ تأكيد كلمة المرور">
      <button id="registerBtn"><i class="fas fa-check-circle"></i> إنشاء حساب</button>
      <p>لديك حساب بالفعل؟ <span id="showLogin">تسجيل الدخول</span></p>
    </div>
  </div>

  <!-- Main App -->
  <div class="app hidden" id="app">
    <aside class="sidebar glass-card">
      <div>
        <h1><i class="fas fa-radio"></i> RADIO</h1>
        <button id="addRadioBtn"><i class="fas fa-plus"></i> إضافة محطة</button>
        <input type="text" id="searchInput" placeholder="🔍 بحث عن محطة...">
        <div class="menu">
          <div class="menu-item active" data-filter="all"><i class="fas fa-home"></i> الرئيسية</div>
          <div class="menu-item" data-filter="favorites"><i class="fas fa-heart"></i> المفضلة</div>
          <div class="menu-item" data-filter="recent"><i class="fas fa-history"></i> آخر تشغيل</div>
        </div>
      </div>
      <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <h2 id="pageTitle">📻 جميع المحطات</h2>
      </div>
      <div class="radio-grid" id="radioGrid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </main>
  </div>

  <!-- Add Radio Modal -->
  <div class="modal hidden" id="radioModal">
    <div class="modal-content glass-card">
      <h2><i class="fas fa-plus-circle"></i> إضافة محطة جديدة</h2>
      <input type="text" id="radioName" placeholder="📻 اسم المحطة">
      <input type="text" id="radioUrl" placeholder="🔗 رابط البث المباشر">
      <input type="text" id="radioCategory" placeholder="🏷️ التصنيف">
      <input type="file" id="radioImage" accept="image/*">
      <button id="saveRadioBtn"><i class="fas fa-save"></i> حفظ المحطة</button>
      <button id="closeModalBtn"><i class="fas fa-times"></i> إغلاق</button>
    </div>
  </div>

  <!-- Mini Player -->
  <div class="mini-player hidden" id="miniPlayer">
    <div class="player-left">
      <img id="playerImage" src="" alt="station">
      <div>
        <h4 id="playerTitle">لا توجد محطة</h4>
        <span>🎵 راديو مباشر</span>
      </div>
    </div>
    <div class="player-controls">
      <button id="prevBtn"><i class="fas fa-backward"></i></button>
      <button id="playPauseBtn"><i class="fas fa-play"></i></button>
      <button id="nextBtn"><i class="fas fa-forward"></i></button>
    </div>
    <div class="volume-wrapper">
      <i class="fas fa-volume-up"></i>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { 
      getAuth, GoogleAuthProvider, createUserWithEmailAndPassword,
      signInWithEmailAndPassword, signInWithPopup, sendEmailVerification,
      sendPasswordResetEmail, onAuthStateChanged, signOut 
    } from "firebase/auth";
    import {
      getFirestore, collection, addDoc, getDocs, deleteDoc, doc,
      updateDoc, query, orderBy, serverTimestamp
    } from "firebase/firestore";
    import {
      getStorage, ref, uploadBytes, getDownloadURL
    } from "firebase/storage";

    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBRvU198Ov7i6XdQTiKkuPJ-8biyKQt0Eo",
      authDomain: "radioapp-4f31a.firebaseapp.com",
      projectId: "radioapp-4f31a",
      storageBucket: "radioapp-4f31a.firebasestorage.app",
      messagingSenderId: "109582001862",
      appId: "1:109582001862:web:0f88fc50166c6d3d3019c7"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    // Splash Screen
    setTimeout(() => {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 500);
      }
    }, 2500);

    // DOM Elements
    const loginCard = document.getElementById('loginCard');
    const registerCard = document.getElementById('registerCard');
    const appContainer = document.getElementById('app');
    const authContainer = document.getElementById('authContainer');
    const radioGrid = document.getElementById('radioGrid');
    const miniPlayer = document.getElementById('miniPlayer');
    const searchInput = document.getElementById('searchInput');

    // Audio Player
    const audio = new Audio();
    audio.crossOrigin = 'anonymous';
    audio.volume = 0.8;

    let radios = [];
    let currentIndex = 0;
    let currentFilter = 'all';

    function showToast(icon, title, timer = 3000) {
      Swal.fire({
        toast: true,
        position: 'top-end',
        icon: icon,
        title: title,
        showConfirmButton: false,
        timer: timer,
        background: '#1e293b',
        color: '#fff'
      });
    }

    // Auth UI
    document.getElementById('showRegister')?.addEventListener('click', () => {
      loginCard.classList.add('hidden');
      registerCard.classList.remove('hidden');
    });

    document.getElementById('showLogin')?.addEventListener('click', () => {
      registerCard.classList.add('hidden');
      loginCard.classList.remove('hidden');
    });

    // Register
    document.getElementById('registerBtn')?.addEventListener('click', async () => {
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirmPassword').value;

      if (!name || !email || !password) return showToast('error', 'يرجى تعبئة جميع الحقول');
      if (password !== confirm) return showToast('error', 'كلمتا المرور غير متطابقتين');
      if (password.length < 6) return showToast('error', 'كلمة المرور يجب أن تكون 6 أحرف على الأقل');

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await sendEmailVerification(userCredential.user);
        showToast('success', 'تم إنشاء الحساب! يرجى تفعيل بريدك الإلكتروني');
        document.getElementById('registerName').value = '';
        document.getElementById('registerEmail').value = '';
        document.getElementById('registerPassword').value = '';
        document.getElementById('registerConfirmPassword').value = '';
        registerCard.classList.add('hidden');
        loginCard.classList.remove('hidden');
      } catch (error) {
        showToast('error', error.message);
      }
    });

    // Login
    document.getElementById('loginBtn')?.addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) return showToast('error', 'يرجى إدخال البريد الإلكتروني وكلمة المرور');

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        if (!userCredential.user.emailVerified) {
          showToast('warning', 'يرجى تفعيل البريد الإلكتروني أولاً');
          await signOut(auth);
          return;
        }
        showToast('success', 'مرحباً بك!');
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
      } catch (error) {
        showToast('error', 'البريد الإلكتروني أو كلمة المرور غير صحيحة');
      }
    });

    // Google Login
    document.getElementById('googleLoginBtn')?.addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, provider);
        showToast('success', 'تم تسجيل الدخول عبر Google');
      } catch (error) {
        showToast('error', error.message);
      }
    });

    // Forgot Password
    document.getElementById('forgotPasswordBtn')?.addEventListener('click', async () => {
      const { value: email } = await Swal.fire({
        title: 'استعادة كلمة المرور',
        input: 'email',
        inputPlaceholder: 'أدخل بريدك الإلكتروني',
        showCancelButton: true,
        confirmButtonText: 'إرسال',
        cancelButtonText: 'إلغاء'
      });

      if (email) {
        try {
          await sendPasswordResetEmail(auth, email);
          showToast('success', 'تم إرسال رابط إعادة التعيين إلى بريدك');
        } catch (error) {
          showToast('error', 'البريد الإلكتروني غير موجود');
        }
      }
    });

    // Auth State
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        authContainer.classList.add('hidden');
        appContainer.classList.remove('hidden');
        await loadRadios();
        loadLastPlayed();
      } else {
        authContainer.classList.remove('hidden');
        appContainer.classList.add('hidden');
        miniPlayer.classList.add('hidden');
        radios = [];
      }
    });

    // Logout
    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
      await signOut(auth);
      showToast('success', 'تم تسجيل الخروج');
      audio.pause();
      audio.src = '';
    });

    // Modal
    document.getElementById('addRadioBtn')?.addEventListener('click', () => {
      document.getElementById('radioModal').classList.remove('hidden');
    });

    document.getElementById('closeModalBtn')?.addEventListener('click', () => {
      document.getElementById('radioModal').classList.add('hidden');
      document.getElementById('radioName').value = '';
      document.getElementById('radioUrl').value = '';
      document.getElementById('radioCategory').value = '';
      document.getElementById('radioImage').value = '';
    });

    // Add Radio
    document.getElementById('saveRadioBtn')?.addEventListener('click', async () => {
      const name = document.getElementById('radioName').value;
      const streamUrl = document.getElementById('radioUrl').value;
      const category = document.getElementById('radioCategory').value || 'عام';
      const imageFile = document.getElementById('radioImage').files[0];

      if (!name || !streamUrl || !imageFile) {
        return showToast('warning', 'يرجى تعبئة جميع الحقول');
      }

      try {
        const imageRef = ref(storage, `radios/${Date.now()}_${imageFile.name}`);
        await uploadBytes(imageRef, imageFile);
        const imageUrl = await getDownloadURL(imageRef);

        await addDoc(collection(db, 'radios'), {
          name, streamUrl, category, imageUrl,
          createdBy: auth.currentUser.uid,
          createdAt: serverTimestamp(),
          favorite: false
        });

        showToast('success', 'تمت إضافة المحطة بنجاح');
        document.getElementById('radioModal').classList.add('hidden');
        document.getElementById('radioName').value = '';
        document.getElementById('radioUrl').value = '';
        document.getElementById('radioCategory').value = '';
        document.getElementById('radioImage').value = '';
        await loadRadios();
      } catch (error) {
        showToast('error', error.message);
      }
    });

      try {

        const querySnapshot = await getDocs(q);
        
        radios = [];
        querySnapshot.forEach((docItem) => {
          radios.push({ id: docItem.id, ...docItem.data() });
        });

        if (radios.length === 0) {
          radioGrid.innerHTML = '<div class="empty-state"><i class="fas fa-radio"></i><h3>لا توجد محطات بعد</h3><p>أضف محطتك الأولى!</p></div>';

        }

        renderRadios();

      }
    }
